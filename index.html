// ── MAP GENERATION ──
function buildMap(){
farms=[]; bridges=[]; rivers=[];

// Rivers with bridges
const riverPositions = [1800, 3600, 5400, 7200, 9000, 10500];
for(const rx of riverPositions){
rivers.push({ x:rx, width:80 });
bridges.push({ x:rx, intact:true, hp:100, maxHp:100, width:80 });
}

// Farms scattered along the route
for(let i=0; i<22; i++){
const fx = 600 + i * 480 + (Math.random()-0.5)*160;
if(!rivers.some(r => Math.abs(r.x - fx)<120)){
farms.push({
x: fx,
food: 30 + Math.floor(Math.random()*20),
maxFood: 50,
alive: true,
burning: false,
burnTimer: 0,
});
}
}
}

// ── ENTITY CREATION ──
function createFrenchSoldier(x, y){
return {
x, y: y || GROUND_Y + 20 + Math.random()*60,
hp: 100, maxHp: 100,
alive: true,
dying: false, dyingMs: 0,
deathType: null, // ‘combat’,‘freeze’,‘disease’
speed: napoleon.speed + (Math.random()-0.5)*8,
walkTimer: Math.random()*1000,
facing: 1,
frozen: 0, // 0-1 how frozen

offsetY: (Math.random()-0.5)*30,
id: Math.random(),
};
}

function createRussianSoldier(x, y){
return {
x, y: y || GROUND_Y + 30 + Math.random()*50,
hp: 80, maxHp: 80,
alive: true,
dying: false, dyingMs: 0,
speed: 55,
walkTimer: Math.random()*1000,
facing: -1,
atkCd: 0, atkCdMax: 700,
atkTimer: 0,
atkRange: 36,
flash: 0,

}

function initNapoleonArmy(){

const x = 120 + Math.random()*300;
napoleon.soldiers.push(createFrenchSoldier(x));
}

napoleon.x = 200;
napoleon.retreating = false;

}

}

function burnMoscow(){
phase = ‘burned’;
// Big fire effects
for(let i=0; i<40; i++){
particles.push({

y: GROUND_Y - 40 - Math.random()*120,

});
}
// Napoleon gets NO food from Moscow
addMessage(‘Moscow burns! Napoleon has nothing. He must retreat into winter.’, 5000);
}

function startGame(){
phase = ‘playing’;
buildMap();
initNapoleonArmy();
russia.bank = 50;
russia.deployed = [];
russia.controlledIdx = -1;
russia.totalDeployed = 0;
temperature = 15;
gameTime = 0;

camera.x = 0;
effects = [];
particles = [];
messages = [];
addMessage(‘June 1812: Napoleon crosses into Russia with 100,000 men.’, 4000);
addMessage(‘Drag soldiers from the bank to deploy. You control one directly.’, 5000);
}

function resetGame(){
phase = ‘title’;
}

// ── MESSAGES ──
function addMessage(text, duration){
messages.push({ text, life: duration, maxLife: duration });
}

// ── UPDATE ──
function update(dt){
gameTime += dt;

// Update messages
for(let i=messages.length-1; i>=0; i–){
messages[i].life -= dt;
if(messages[i].life <= 0) messages.splice(i,1);
}

// Update particles
for(let i=particles.length-1; i>=0; i–){
const p=particles[i];
p.x += p.vx; p.y += p.vy;
p.life -= dt;
if(p.life<=0) particles.splice(i,1);
}

if(phase===‘playing’) updatePlaying(dt);
else if(phase===‘retreat’) updateRetreat(dt);
}

function updatePlaying(dt){
// Temperature drops as Napoleon approaches Moscow
const progress = napoleon.x / MOSCOW_X;
// June (15°C) → September at Moscow (~5°C approach), sharper drop later
temperature = 15 - progress * 12;

updateNapoleonAdvance(dt);
updateRussianForces(dt);
updateCombat(dt);
updateFarmsAndBridges(dt);

// Camera follows action — weighted between player soldier and Napoleon
let focusX = napoleon.x - 400;
if(russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx]?.alive){
const cs = russia.deployed[russia.controlledIdx];
focusX = cs.x - 350;
}
camera.x += (focusX - camera.x) * Math.min(1, dt/300);
camera.x = Math.max(0, Math.min(MAP_WIDTH - W, camera.x));

// Check: Napoleon reaches Moscow
if(napoleon.x >= MOSCOW_X && !napoleon.atMoscow){
napoleon.atMoscow = true;
napoleon.stopped = true;
const alive = napoleon.soldiers.filter(s=>s.alive&&!s.dying).length;
addMessage(`Napoleon reaches Moscow with ${alive} soldiers!`, 5000);
}
}

const retreatProgress = retreatTime / 120000; // ~2min full retreat

napoleon.x -= napoleon.speed * (dt/1000);
// French soldiers follow

if(!s.alive || s.dying) continue;
const targetX = napoleon.x + (s.x - napoleon.x) * 0.3 + (Math.random()-0.5)*2;
s.x += (targetX - s.x) * 0.01 - napoleon.speed * (dt/1000) * 0.9;
s.walkTimer += dt;

if(keys[‘ArrowDown’]||keys[‘KeyS’]) dy=1;
if(Math.abs(touch.jx)>0.1) dx=touch.jx;
if(Math.abs(touch.jy)>0.1) dy=touch.jy;
const len=Math.hypot(dx,dy);
if(len>0){ dx/=len; dy/=len; }
controlled.x += dx * controlled.speed * (dt/1000);
controlled.y += dy * controlled.speed * 0.6 * (dt/1000);
controlled.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, controlled.y));
controlled.x = Math.max(camera.x+20, Math.min(MAP_WIDTH-20, controlled.x));
if(dx!==0) controlled.facing = dx>0?1:-1;
controlled.walkTimer += dt * (Math.abs(dx)+Math.abs(dy) > 0 ? 1 : 0);

function drawProgressBar(){
const barW = 300, barH = 14;
const bx = W/2-barW/2, by = H-28;

ctx.beginPath(); ctx.roundRect(bx-4,by-4,barW+8,barH+8,6); ctx.fill();

ctx.fillStyle=’#333’; ctx.fillRect(bx,by,barW,barH);

// Napoleon position on bar
const prog = Math.max(0, Math.min(1, napoleon.x / MOSCOW_X));
ctx.fillStyle=’#2a3a6a’; ctx.fillRect(bx, by, barW*prog, barH);

ctx.fillStyle=’#c84020’; ctx.fillRect(bx+barW-3, by, 3, barH);

// River markers
for(const r of rivers){
const rp = r.x / MOSCOW_X;
ctx.fillStyle=COL.water; ctx.fillRect(bx+barW*rp-1, by, 2, barH);
}

// Labels
ctx.fillStyle=’#aaa’; ctx.font=‘9px “IM Fell English”, serif’; ctx.textAlign=‘left’;
ctx.fillText(‘Niemen’, bx-2, by-2);
ctx.textAlign=‘right’;
ctx.fillText(‘Moscow’, bx+barW+2, by-2);
}

function drawMessages(){
let my = H/2 - 50;
for(const msg of messages){
const alpha = Math.min(1, msg.life / 500);
ctx.save(); ctx.globalAlpha=alpha;
ctx.fillStyle=‘rgba(0,0,0,0.7)’;
const tw = ctx.measureText(msg.text).width || 300;
ctx.beginPath(); ctx.roundRect(W/2-tw/2-20, my-8, tw+40, 26, 6); ctx.fill();
ctx.fillStyle=’#ffeedd’;
ctx.font=‘13px “IM Fell English”, serif’;
ctx.textAlign=‘center’;
ctx.fillText(msg.text, W/2, my+8);
ctx.restore();
my += 32;
}
}

function getSeasonLabel(){
const progress = napoleon.x / MOSCOW_X;
if(phase===‘retreat’){
const rp = retreatTime / 120000;
if(rp < 0.2) return ‘October 1812’;
if(rp < 0.5) return ‘November 1812’;
return ‘December 1812’;
}
if(progress < 0.15) return ‘June 1812’;
if(progress < 0.35) return ‘July 1812’;
if(progress < 0.55) return ‘August 1812’;
if(progress < 0.75) return ‘September 1812’;
return ‘September 1812’;
}

// ── BRIDGE BUILDING INDICATOR ──
function drawBridgeBuildIndicator(){
if(!napoleon.buildingBridge) return;
const sx = napoleon.x - camera.x;
const pct = napoleon.bridgeBuildTime / napoleon.bridgeBuildMax;
ctx.fillStyle=‘rgba(0,0,0,0.6)’;
ctx.beginPath(); ctx.roundRect(sx-60, GROUND_Y-20, 120, 20, 4); ctx.fill();
ctx.fillStyle=’#c8a040’;

ctx.fillText(‘Building Bridge…’, sx, GROUND_Y-6);
}

// ── UTILITY ──
function lerpColor(a, b, t){
const ah=parseInt(a.slice(1),16), bh=parseInt(b.slice(1),16);
const ar=(ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
const br=(bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
const rr=Math.round(ar+(br-ar)*t);
const rg=Math.round(ag+(bg-ag)*t);
const rb=Math.round(ab+(bb-ab)*t);
return `rgb(${rr},${rg},${rb})`;
}

// ── MAIN DRAW ──
function draw(){
ctx.clearRect(0,0,W,H);

if(phase===‘title’){
drawTitle(); return;
}
if(phase===‘gameover_win’||phase===‘gameover_lose’||phase===‘napoleon_wins’||phase===‘burned’){
// Draw the world behind the overlay
drawSky(); drawGround(); drawRivers(); drawBridges(); drawFarms(); drawMoscow();
// Sort and draw all soldiers
const all = […napoleon.soldiers.filter(s=>s.alive||s.dying), …russia.deployed.filter(s=>s.alive||s.dying)];
all.sort((a,b)=>a.y-b.y);
for(const s of all){
if(napoleon.soldiers.includes(s)) drawFrenchSoldier(s);
else drawRussianSoldier(s);
}
drawNapoleon();
drawParticles();
drawEndScreen();
return;
}

drawSky();
drawGround();
drawRivers();
drawBridges();
drawFarms();
drawMoscow();

// Z-sort all soldiers
const all = […napoleon.soldiers.filter(s=>s.alive||s.dying), …russia.deployed.filter(s=>s.alive||s.dying)];
all.push({_isNapoleon:true, y:GROUND_Y+35, alive:true});
all.sort((a,b)=>a.y-b.y);
for(const s of all){
if(s._isNapoleon){ drawNapoleon(); continue; }
if(napoleon.soldiers.includes(s)) drawFrenchSoldier(s);
else drawRussianSoldier(s);
}

drawParticles();
drawBridgeBuildIndicator();
drawHUD();

if(napoleon.atMoscow && phase===‘playing’) drawMoscowChoice();
}

function drawParticles(){
for(const p of particles){
const sx = p.x - camera.x;
const alpha = p.life / p.maxLife;
ctx.save(); ctx.globalAlpha=alpha;
ctx.fillStyle=p.color;
ctx.beginPath(); ctx.arc(sx, p.y, p.r*alpha, 0, Math.PI*2); ctx.fill();
ctx.restore();
}
}

// ── GAME LOOP ──
let lastTs=0;
function loop(ts){
const dt=Math.min(50, ts-lastTs);
lastTs=ts;
if(phase!==‘title’) update(dt);
else gameTime += dt; // for title animation
draw();
requestAnimationFrame(loop);
}

requestAnimationFrame(ts=>{ lastTs=ts; requestAnimationFrame(loop); });
</script>
