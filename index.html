<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>1812 — The Retreat Will Teach Them</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;overflow:hidden;font-family:'IM Fell English',serif}
#wrap{position:relative;width:1000px;max-width:100vw;aspect-ratio:1000/560;flex-shrink:0}
canvas{display:block;width:100%;height:100%;cursor:default}

/* Mobile deploy panel — sits below the canvas in the dead space */
#mobile-deploy{
  display:none;
  width:100vw;
  background:rgba(8,18,8,0.97);
  border-top:1.5px solid #3a7a3a;
  padding:10px 16px 14px;
  flex-direction:column;
  gap:8px;
  flex-shrink:0;
}
#md-header{
  display:flex;justify-content:space-between;align-items:center;
  color:#aad4aa;font-family:'IM Fell English',serif;font-size:13px;
}
#md-controls{display:flex;align-items:center;gap:8px}
.md-btn{
  background:#1a2a1a;border:1.5px solid #3a7a3a;color:#ccffcc;
  font-family:Cinzel,serif;font-size:16px;font-weight:bold;
  width:38px;height:38px;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.md-btn:active{background:#2a4a2a}
.md-btn:disabled{background:#111;border-color:#333;color:#444}
#md-count{
  background:#111;border:1px solid #333;color:#fff;
  font-family:Cinzel,serif;font-size:16px;font-weight:bold;
  width:52px;height:38px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  letter-spacing:1px;
}
#md-send{
  flex:1;height:38px;background:#1a4a1a;border:1.5px solid #3a8a3a;
  color:#ccffcc;font-family:Cinzel,serif;font-size:13px;font-weight:bold;
  border-radius:6px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
#md-send:active{background:#2a6a2a}
#md-send:disabled{background:#111;border-color:#333;color:#444}
#md-in-battle{
  display:none;align-items:center;gap:10px;
  color:#aaffaa;font-family:Cinzel,serif;font-size:13px;
}
#md-in-battle-label{flex:1}

@media(max-width:768px){
  #wrap{width:100vw;max-width:none;aspect-ratio:1000/560;height:auto}
  body{justify-content:flex-start;align-items:stretch}
  #mobile-deploy{display:flex}
}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="mobile-deploy">
  <!-- Shown when NOT inBattle -->
  <div id="md-idle">
    <div id="md-header">
      <span>Russian Reserve: <strong id="md-bank">50</strong></span>
      <span style="color:#666;font-size:11px">Add soldiers, then deploy</span>
    </div>
    <div id="md-controls">
      <button class="md-btn" id="md-minus">−</button>
      <div id="md-count">0</div>
      <button class="md-btn" id="md-plus">+</button>
      <button id="md-send">&#x2694; Send into Battle</button>
    </div>
  </div>
  <!-- Shown when inBattle -->
  <div id="md-in-battle">
    <span id="md-in-battle-label">&#x2694; In Battle — WASD + Space to fight</span>
  </div>
</div>
<script>
'use strict';

const W=1000, H=560;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

// -- GAME CONSTANTS --
const MAP_WIDTH = 12000;
const MOSCOW_X = MAP_WIDTH - 400;
const GROUND_Y = 340;
const LANE_TOP = 300, LANE_BOT = 440;
const DEPLOY_ZONE_X = 150;

// -- COLORS --
const COL = {
sky1:'#b8c6d4', sky2:'#8a9bb0', sky3:'#5a6a7a',
ground:'#8a9a6a', groundWinter:'#c8c8d0',
snow:'#e8e8f0', road:'#6a6050', roadSnow:'#9a9a9f',
russian:'#1a5a2a', russianLight:'#2a7a3a',
french:'#1a2a6a', frenchLight:'#2a3a8a',
gold:'#c4a020', blood:'#8a1a1a',
fire:'#e85020', fireGlow:'#ff8040',
ice:'#4a8aff', sick:'#4a8a2a',
wood:'#5a4030', water:'#3a5a8a', waterLight:'#5a8aba',
farm:'#aa8a50', wheat:'#c8a830',
};

// -- GAME STATE --
let phase = 'title'; // title | playing | burned | napoleon_wins | retreat | gameover_win | gameover_lose
let camera = { x: 0 };
let temperature = 15; // Celsius, drops as Napoleon approaches Moscow and during retreat
let gameTime = 0;
let retreatTime = 0;

// Napoleon's army
let napoleon = {
x: 200, y: GROUND_Y + 40,
soldiers: [],
food: 800,
maxFood: 800,
speed: 38,
alive: true,
retreating: false,
stopped: false,
stopTimer: 0,
atMoscow: false,
buildingBridge: false,
bridgeBuildTime: 0,
bridgeBuildMax: 3000,
};

// Russian forces
let russia = {
bank: 50,
deployed: [],
controlledIdx: -1,
totalDeployed: 0,
pendingSoldiers: 0,
inBattle: false,
};

// Map features
let farms = [];
let bridges = [];
let rivers = [];
let mapFeatures = [];

// Player input
let keys = {};
let mouse = { x:0, y:0, down:false };
let dragFromBank = false;
const isMobile = 'ontouchstart' in window;
const touch = { jx:0, jy:0, jActive:false, jSX:0, jSY:0, attack:false, atkId:-1, jId:-1 };
const JR=48, JCX=75, JCY=H-85, ACX=W-75, ACY=H-85, AR=46;

// -- MOBILE DEPLOY PANEL --
const mdBank    = document.getElementById('md-bank');
const mdCount   = document.getElementById('md-count');
const mdMinus   = document.getElementById('md-minus');
const mdPlus    = document.getElementById('md-plus');
const mdSend    = document.getElementById('md-send');
const mdIdle    = document.getElementById('md-idle');
const mdBattle  = document.getElementById('md-in-battle');

function syncMobilePanel(){
  if(!isMobile) return;
  if(mdBank)  mdBank.textContent  = russia.bank;
  if(mdCount) mdCount.textContent = russia.pendingSoldiers;
  if(mdMinus) mdMinus.disabled = russia.pendingSoldiers <= 0;
  if(mdPlus)  mdPlus.disabled  = russia.bank <= 0;
  if(mdSend)  mdSend.disabled  = russia.pendingSoldiers <= 0;
  const inBattle = russia.inBattle;
  if(mdIdle)   mdIdle.style.display   = inBattle ? 'none'  : 'block';
  if(mdBattle) mdBattle.style.display = inBattle ? 'flex'  : 'none';
}

if(mdMinus) mdMinus.addEventListener('click', () => {
  if(russia.pendingSoldiers > 0){ russia.pendingSoldiers--; russia.bank++; syncMobilePanel(); }
});
if(mdPlus) mdPlus.addEventListener('click', () => {
  if(russia.bank > 0){ russia.pendingSoldiers++; russia.bank--; syncMobilePanel(); }
});
if(mdSend) mdSend.addEventListener('click', () => {
  if(russia.pendingSoldiers > 0 && (phase==='playing'||phase==='retreat')){ sendIntoBattle(); syncMobilePanel(); }
});

// Effects
let effects = [];
let particles = [];
let messages = [];

// -- INPUT --
window.addEventListener('keydown', e => { keys[e.code]=true; });
window.addEventListener('keyup', e => { keys[e.code]=false; });

function toCanvas(cx,cy){
const r=canvas.getBoundingClientRect();
return [(cx-r.left)*(W/r.width),(cy-r.top)*(H/r.height)];
}

canvas.addEventListener('mousedown', e => {
const [mx,my]=toCanvas(e.clientX,e.clientY);
mouse.x=mx; mouse.y=my; mouse.down=true;
handleMouseDown(mx,my);
});
canvas.addEventListener('mousemove', e => {
const [mx,my]=toCanvas(e.clientX,e.clientY);
mouse.x=mx; mouse.y=my;
});
canvas.addEventListener('mouseup', e => {
const [mx,my]=toCanvas(e.clientX,e.clientY);
mouse.down=false;
handleMouseUp(mx,my);
});
canvas.addEventListener('click', e => {
const [mx,my]=toCanvas(e.clientX,e.clientY);
handleClick(mx,my);
});

// Touch support  - multi-touch for joystick, attack, and deploy drag
canvas.addEventListener('touchstart', e => {
e.preventDefault();
for(const t of e.changedTouches){
const [tx,ty]=toCanvas(t.clientX,t.clientY);

// Title / end screen taps
if(phase==='title'||phase==='burned'||phase==='napoleon_wins'||phase==='gameover_win'||phase==='gameover_lose'
  ||(phase==='playing'&&napoleon.atMoscow)){
  handleClick(tx,ty);
  continue;
}

// Attack button area (right side, bottom)
if(tx > W-140 && ty > H-150){
  touch.attack=true; touch.atkId=t.identifier;
  continue;
}
// Joystick area (left side, bottom)  - only when inBattle
if(russia.inBattle && tx < 160 && ty > H-160){
  touch.jActive=true; touch.jId=t.identifier;
  touch.jSX=tx; touch.jSY=ty; touch.jx=0; touch.jy=0;
  continue;
}
// Deploy box button taps
handleClick(tx,ty);

}
},{passive:false});

canvas.addEventListener('touchmove', e => {
e.preventDefault();
for(const t of e.changedTouches){
const [tx,ty]=toCanvas(t.clientX,t.clientY);
if(t.identifier===touch.jId && touch.jActive){
let dx=tx-touch.jSX, dy=ty-touch.jSY;
const len=Math.sqrt(dx*dx+dy*dy);
if(len>JR){dx*=JR/len;dy*=JR/len;}
touch.jx=dx/JR; touch.jy=dy/JR;
}
}
},{passive:false});

canvas.addEventListener('touchend', e => {
e.preventDefault();
for(const t of e.changedTouches){
if(t.identifier===touch.jId){
touch.jActive=false; touch.jx=0; touch.jy=0; touch.jId=-1;
}
if(t.identifier===touch.atkId){
touch.attack=false; touch.atkId=-1;
}
}
},{passive:false});

// -- MAP GENERATION --
function buildMap(){
farms=[]; bridges=[]; rivers=[];

// Rivers with bridges
const riverPositions = [1800, 3600, 5400, 7200, 9000, 10500];
for(const rx of riverPositions){
rivers.push({ x:rx, width:80 });
bridges.push({ x:rx, intact:true, hp:100, maxHp:100, width:80 });
}

// Farms scattered along the route
for(let i=0; i<22; i++){
const fx = 600 + i * 480 + (Math.random()-0.5)*160;
if(!rivers.some(r => Math.abs(r.x - fx)<120)){
farms.push({
x: fx,
food: 30 + Math.floor(Math.random()*20),
maxFood: 50,
alive: true,
burning: false,
burnTimer: 0,
});
}
}
}

// -- ENTITY CREATION --
function createFrenchSoldier(x, y, role){
return {
x, y: y || GROUND_Y + 20 + Math.random()*60,
hp: 100, maxHp: 100,
alive: true,
dying: false, dyingMs: 0,
deathType: null,
speed: napoleon.speed + (Math.random()-0.5)*8,
walkTimer: Math.random()*1000,
facing: 1,
frozen: 0,
diseased: false,
flash: 0,
offsetY: (Math.random()-0.5)*40,
role: role || 'column', // 'vanguard','column','raider'
raidTarget: null,
raidReturning: false,
id: Math.random(),
};
}

function createRussianSoldier(x, y){
return {
x, y: y || GROUND_Y + 30 + Math.random()*50,
hp: 80, maxHp: 80,
alive: true,
dying: false, dyingMs: 0,
speed: 55,
walkTimer: Math.random()*1000,
facing: -1,
atkCd: 0, atkCdMax: 700,
atkTimer: 0,
atkRange: 36,
flash: 0,
controlled: false,
id: Math.random(),
};
}

function initNapoleonArmy(){
napoleon.soldiers = [];
// Vanguard: advance scouts spread ahead of Napoleon
for(let i=0; i<12; i++){
const x = 260 + Math.random()*100;
const s = createFrenchSoldier(x, undefined, 'vanguard');
s.offsetY = (Math.random()-0.5)*50;
napoleon.soldiers.push(s);
}
// Main column: stretched behind Napoleon
for(let i=0; i<78; i++){
const x = 80 + Math.random()*180;
const s = createFrenchSoldier(x, undefined, 'column');
napoleon.soldiers.push(s);
}
// Raiders: soldiers that visibly detach to forage farms
for(let i=0; i<10; i++){
const x = 120 + Math.random()*150;
const s = createFrenchSoldier(x, undefined, 'raider');
napoleon.soldiers.push(s);
}
napoleon.food = 800;
napoleon.x = 200;
napoleon.retreating = false;
napoleon.atMoscow = false;
}

// -- HANDLE INPUT --
function handleMouseDown(mx, my){
// no drag-to-deploy; clicks handled by handleClick
}

function handleMouseUp(mx, my){
}

function handleClick(mx, my){
if(phase==='title'){
// Check start button
if(mx > W/2-120 && mx < W/2+120 && my > H/2+80 && my < H/2+130){
startGame();
}
return;
}
if(phase==='burned'){
// Continue to retreat phase
phase = 'retreat';
napoleon.retreating = true;
napoleon.speed = 28;
retreatTime = 0;
for(const s of napoleon.soldiers) s.facing = -1;
addMessage('Napoleon retreats! The winter will do the rest...', 4000);
return;
}
if(phase==='napoleon_wins' || phase==='gameover_win' || phase==='gameover_lose'){
if(my > H/2+60 && my < H/2+110){
resetGame();
}
return;
}
// Burn Moscow choice
if(phase==='playing' && napoleon.atMoscow){
// Buttons drawn in HUD
const btnY = H/2 + 20;
if(my > btnY && my < btnY+50){
if(mx > W/2-220 && mx < W/2-20){
// BURN IT
burnMoscow();
} else if(mx > W/2+20 && mx < W/2+220){
// SURRENDER
phase = 'napoleon_wins';
}
}
return;
}

// Deploy box buttons (desktop only — mobile uses HTML panel)
if(!isMobile && (phase==='playing' || phase==='retreat') && !russia.inBattle){
// Minus
if(mx >= BTN_MINUS.x && mx <= BTN_MINUS.x+BTN_MINUS.w && my >= BTN_MINUS.y && my <= BTN_MINUS.y+BTN_MINUS.h){
if(russia.pendingSoldiers > 0){ russia.pendingSoldiers--; russia.bank++; }
return;
}
// Plus
if(mx >= BTN_PLUS.x && mx <= BTN_PLUS.x+BTN_PLUS.w && my >= BTN_PLUS.y && my <= BTN_PLUS.y+BTN_PLUS.h){
if(russia.bank > 0){ russia.pendingSoldiers++; russia.bank--; }
return;
}
// Send into battle
if(mx >= BTN_SEND.x && mx <= BTN_SEND.x+BTN_SEND.w && my >= BTN_SEND.y && my <= BTN_SEND.y+BTN_SEND.h){
if(russia.pendingSoldiers > 0){
sendIntoBattle();
}
return;
}
}

// Click on deployed Russian soldier to switch control (only when inBattle)
if(russia.inBattle && (phase==='playing' || phase==='retreat')){
for(let i=0; i<russia.deployed.length; i++){
const s = russia.deployed[i];
if(!s.alive) continue;
const sx = s.x - camera.x;
if(Math.abs(mx-sx)<20 && Math.abs(my-s.y)<30){
if(russia.controlledIdx>=0 && russia.deployed[russia.controlledIdx])
russia.deployed[russia.controlledIdx].controlled = false;
s.controlled = true;
russia.controlledIdx = i;
break;
}
}
}
}

function burnMoscow(){
phase = 'burned';
// Big fire effects
for(let i=0; i<40; i++){
particles.push({
x: MOSCOW_X + Math.random()*300 - 50,
y: GROUND_Y - 40 - Math.random()*120,
vx: (Math.random()-0.5)*2,
vy: -1 - Math.random()*3,
life: 2000 + Math.random()*3000,
maxLife: 5000,
r: 4+Math.random()*8,
color: Math.random()>0.5 ? COL.fire : COL.fireGlow,
});
}
// Napoleon gets NO food from Moscow
addMessage('Moscow burns! Napoleon has nothing. He must retreat into winter.', 5000);
}

function sendIntoBattle(){
if(russia.pendingSoldiers <= 0) return;
// Deselect previous controlled
if(russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx])
russia.deployed[russia.controlledIdx].controlled = false;
russia.controlledIdx = -1;

// Spawn soldiers on the right side of the screen (just inside view)
const spawnBaseX = camera.x + W - 80;
for(let i=0; i<russia.pendingSoldiers; i++){
const sy = LANE_TOP + 20 + Math.random() * (LANE_BOT - LANE_TOP - 40);
const sx = spawnBaseX - i * 18 + (Math.random()-0.5)*10;
const s = createRussianSoldier(Math.max(camera.x+20, sx), sy);
if(i === 0){
s.controlled = true;
russia.controlledIdx = russia.deployed.length;
}
russia.deployed.push(s);
russia.totalDeployed++;
}
const count = russia.pendingSoldiers;
russia.pendingSoldiers = 0;
russia.inBattle = true;
addMessage(`${count} soldier${count>1?'s':''} deployed! WASD to move, Space to attack.`, 2500);
addMessage('Camera follows you. Raid farms, attack soldiers!', 2000);
}

function startGame(){
phase = 'playing';
buildMap();
initNapoleonArmy();
russia.bank = 50;
russia.deployed = [];
russia.controlledIdx = -1;
russia.totalDeployed = 0;
russia.pendingSoldiers = 0;
russia.inBattle = false;
temperature = 15;
gameTime = 0;
retreatTime = 0;
camera.x = 0;
effects = [];
particles = [];
messages = [];
addMessage('June 1812: Napoleon crosses into Russia with 100,000 men.', 4000);
addMessage('Use + to add soldiers, then Send into Battle to deploy them.', 5000);
}

function resetGame(){
phase = 'title';
}

// -- MESSAGES --
function addMessage(text, duration){
messages.push({ text, life: duration, maxLife: duration });
}

// -- UPDATE --
function update(dt){
gameTime += dt;

// Update messages
for(let i=messages.length-1; i>=0; i--){
messages[i].life -= dt;
if(messages[i].life <= 0) messages.splice(i,1);
}

// Update particles
for(let i=particles.length-1; i>=0; i--){
const p=particles[i];
p.x += p.vx; p.y += p.vy;
p.life -= dt;
if(p.life<=0) particles.splice(i,1);
}

if(phase==='playing') updatePlaying(dt);
else if(phase==='retreat') updateRetreat(dt);
syncMobilePanel();
}

function updatePlaying(dt){
// Temperature drops as Napoleon approaches Moscow
const progress = napoleon.x / MOSCOW_X;
// June (15°C) → September at Moscow (~5°C approach), sharper drop later
temperature = 15 - progress * 12;

updateNapoleonAdvance(dt);
updateRussianForces(dt);
updateCombat(dt);
updateFarmsAndBridges(dt);

// Camera: follow player only when inBattle and controlled alive
let focusX = napoleon.x - 350;
if(russia.inBattle && russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx]?.alive){
const cs = russia.deployed[russia.controlledIdx];
focusX = cs.x - 500;
}
camera.x += (focusX - camera.x) * Math.min(1, dt/300);
camera.x = Math.max(0, Math.min(MAP_WIDTH - W, camera.x));

// Check: Napoleon reaches Moscow
if(napoleon.x >= MOSCOW_X && !napoleon.atMoscow){
napoleon.atMoscow = true;
napoleon.stopped = true;
const alive = napoleon.soldiers.filter(s=>s.alive&&!s.dying).length;
addMessage(`Napoleon reaches Moscow with ${alive} soldiers!`, 5000);
}
}

function updateRetreat(dt){
retreatTime += dt;
// Temperature plummets during retreat: from ~0 down to -30
const retreatProgress = retreatTime / 120000; // ~2min full retreat
temperature = 0 - retreatProgress * 35;

// Napoleon marches back (leftward)
if(!napoleon.stopped){
napoleon.x -= napoleon.speed * (dt/1000);
// French soldiers follow
for(const s of napoleon.soldiers){
if(!s.alive || s.dying) continue;
const targetX = napoleon.x + (s.x - napoleon.x) * 0.3 + (Math.random()-0.5)*2;
s.x += (targetX - s.x) * 0.01 - napoleon.speed * (dt/1000) * 0.9;
s.walkTimer += dt;

  // Winter attrition
  if(temperature < -5){
    const freezeChance = Math.abs(temperature + 5) * 0.000008 * dt;
    if(Math.random() < freezeChance && !s.dying){
      s.dying = true; s.dyingMs = 1500; s.deathType = 'freeze'; s.frozen = 1;
    }
    const diseaseChance = Math.abs(temperature + 5) * 0.000005 * dt;
    if(Math.random() < diseaseChance && !s.dying){
      s.dying = true; s.dyingMs = 1500; s.deathType = 'disease'; s.diseased = true;
    }
  }
}

// Check rivers  - need bridges
for(const bridge of bridges){
  if(!bridge.intact && Math.abs(napoleon.x - bridge.x) < 60){
    napoleon.stopped = true;
    napoleon.buildingBridge = true;
    napoleon.bridgeBuildTime = 0;
    napoleon.bridgeBuildMax = 4000;
    addMessage('Napoleon must rebuild the bridge! Attack now!', 3000);
    break;
  }
}

} else if(napoleon.buildingBridge) {
napoleon.bridgeBuildTime += dt;
if(napoleon.bridgeBuildTime >= napoleon.bridgeBuildMax){
napoleon.buildingBridge = false;
napoleon.stopped = false;
// Find the bridge and "rebuild" it
for(const b of bridges){
if(!b.intact && Math.abs(napoleon.x - b.x)<100){
b.intact = true; b.hp = 50; break;
}
}
}
}

// Food consumption during retreat
napoleon.food -= dt * 0.015;

// Starvation kills
if(napoleon.food <= 0){
napoleon.food = 0;
const starveChance = 0.00003 * dt;
for(const s of napoleon.soldiers){
if(s.alive && !s.dying && Math.random() < starveChance){
s.dying = true; s.dyingMs = 1500; s.deathType = 'disease';
}
}
}

updateRussianForces(dt);
updateCombat(dt);
updateDying(dt);

// Camera
let focusX = napoleon.x - 350;
if(russia.inBattle && russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx]?.alive){
focusX = russia.deployed[russia.controlledIdx].x - 500;
}
camera.x += (focusX - camera.x) * Math.min(1, dt/300);
camera.x = Math.max(0, Math.min(MAP_WIDTH - W, camera.x));

// Win condition: Napoleon's army destroyed or he retreats past start
const aliveF = napoleon.soldiers.filter(s=>s.alive&&!s.dying).length;
if(aliveF <= 0){
phase = 'gameover_win';
addMessage('The Grande Armée is destroyed!', 5000);
}
if(napoleon.x < 100){
phase = 'gameover_win';
addMessage(`Napoleon escapes with ${aliveF} soldiers of 100,000.`, 5000);
}
}

function updateNapoleonAdvance(dt){
if(napoleon.stopped || napoleon.atMoscow) return;

// Check for river/bridge
for(const bridge of bridges){
if(Math.abs(napoleon.x - bridge.x) < 50){
if(!bridge.intact){
napoleon.stopped = true;
napoleon.buildingBridge = true;
napoleon.bridgeBuildTime = 0;
napoleon.bridgeBuildMax = 5000;
addMessage('Napoleon must build a bridge! This is your chance!', 3000);
return;
}
}
}

// Bridge building
if(napoleon.buildingBridge){
napoleon.bridgeBuildTime += dt;
if(napoleon.bridgeBuildTime >= napoleon.bridgeBuildMax){
napoleon.buildingBridge = false;
napoleon.stopped = false;
for(const b of bridges){
if(!b.intact && Math.abs(napoleon.x - b.x) < 100){
b.intact = true; b.hp = 100; break;
}
}
}
return;
}

// March forward
napoleon.x += napoleon.speed * (dt/1000);

// Soldiers move according to role
for(const s of napoleon.soldiers){
if(!s.alive || s.dying) continue;
s.walkTimer += dt;
napoleon.food -= dt * 0.000006;

if(s.role === 'vanguard'){
  // Vanguard runs ahead of Napoleon
  const targetX = napoleon.x + 60 + s.offsetY * 0.3 + Math.random()*60;
  s.x += (targetX - s.x) * 0.012 + napoleon.speed * (dt/1000) * 0.95;
  s.facing = 1;
} else if(s.role === 'raider'){
  // Raiders detach to loot nearby farms, then return
  let nearFarm = null, nearFarmDist = Infinity;
  for(const farm of farms){
    if(!farm.alive || farm.food <= 0 || farm.burning) continue;
    const d = Math.abs(s.x - farm.x);
    if(d < 350 && farm.x > napoleon.x - 200 && d < nearFarmDist){
      nearFarm = farm; nearFarmDist = d;
    }
  }
  if(nearFarm && !s.raidReturning){
    s.raidTarget = nearFarm;
    const dx = nearFarm.x - s.x;
    if(Math.abs(dx) > 20){
      s.x += Math.sign(dx) * s.speed * 1.1 * (dt/1000);
      s.facing = dx > 0 ? 1 : -1;
    } else {
      // At farm  - forage
      const take = Math.min(dt * 0.012, nearFarm.food);
      nearFarm.food -= take;
      napoleon.food = Math.min(napoleon.maxFood, napoleon.food + take);
      if(nearFarm.food <= 0){ nearFarm.alive = false; s.raidReturning = true; s.raidTarget = null; }
    }
  } else {
    // Return to column
    s.raidReturning = false;
    const targetX = napoleon.x - 80 - Math.random()*150;
    s.x += (targetX - s.x) * 0.01 + napoleon.speed * (dt/1000) * 0.9;
    s.facing = s.x < napoleon.x ? 1 : -1;
  }
} else {
  // Main column  - spread 50-550 behind Napoleon
  const colPos = (napoleon.soldiers.indexOf(s) % 78) / 78;
  const targetX = napoleon.x - 50 - colPos * 500 + s.offsetY * 0.2;
  s.x += (targetX - s.x) * 0.006 + napoleon.speed * (dt/1000) * 0.88;
  s.facing = 1;
  // Forage when passing farms
  for(const farm of farms){
    if(farm.alive && Math.abs(s.x - farm.x) < 50 && farm.food > 0){
      const take = Math.min(dt * 0.004, farm.food);
      farm.food -= take;
      napoleon.food = Math.min(napoleon.maxFood, napoleon.food + take);
      if(farm.food <= 0) farm.alive = false;
    }
  }
}
}

// Starvation
if(napoleon.food <= 0){
napoleon.food = 0;
// Slow deaths from starvation
for(const s of napoleon.soldiers){
if(s.alive && !s.dying && Math.random() < 0.000008 * dt){
s.dying = true; s.dyingMs = 1500; s.deathType = 'disease';
}
}
}

updateDying(dt);
}

function updateDying(dt){
for(const s of napoleon.soldiers){
if(s.dying){
s.dyingMs -= dt;
if(s.dyingMs <= 0){ s.alive = false; s.dying = false; }
}
if(s.flash > 0) s.flash -= dt;
}
for(const s of russia.deployed){
if(s.dying){
s.dyingMs -= dt;
if(s.dyingMs <= 0){ s.alive = false; s.dying = false; }
}
if(s.flash > 0) s.flash -= dt;
}
}

function updateRussianForces(dt){
// If inBattle and controlled soldier died, find next alive or end battle
if(russia.inBattle){
const cur = russia.controlledIdx >= 0 ? russia.deployed[russia.controlledIdx] : null;
if(!cur || (!cur.alive && !cur.dying)){
// Try to hand control to another alive deployed soldier
let newCtrl = -1;
for(let i=0; i<russia.deployed.length; i++){
if(russia.deployed[i].alive && !russia.deployed[i].dying){ newCtrl=i; break; }
}
if(newCtrl >= 0){
if(russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx])
russia.deployed[russia.controlledIdx].controlled = false;
russia.deployed[newCtrl].controlled = true;
russia.controlledIdx = newCtrl;
} else {
russia.inBattle = false;
russia.controlledIdx = -1;
addMessage('Your soldiers are gone. Reinforce from the reserve.', 3000);
}
}
}
const controlled = russia.controlledIdx >= 0 ? russia.deployed[russia.controlledIdx] : null;

// Player-controlled soldier
if(controlled && controlled.alive && !controlled.dying){
let dx=0, dy=0;
if(keys['ArrowLeft']||keys['KeyA']) dx=-1;
if(keys['ArrowRight']||keys['KeyD']) dx=1;
if(keys['ArrowUp']||keys['KeyW']) dy=-1;
if(keys['ArrowDown']||keys['KeyS']) dy=1;
if(Math.abs(touch.jx)>0.1) dx=touch.jx;
if(Math.abs(touch.jy)>0.1) dy=touch.jy;
const len=Math.hypot(dx,dy);
if(len>0){ dx/=len; dy/=len; }
controlled.x += dx * controlled.speed * (dt/1000);
controlled.y += dy * controlled.speed * 0.6 * (dt/1000);
controlled.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, controlled.y));
controlled.x = Math.max(camera.x+20, Math.min(MAP_WIDTH-20, controlled.x));
if(dx!==0) controlled.facing = dx>0?1:-1;
controlled.walkTimer += dt * (Math.abs(dx)+Math.abs(dy) > 0 ? 1 : 0);

// Attack
controlled.atkCd = Math.max(0, controlled.atkCd - dt);
if(controlled.atkTimer > 0) controlled.atkTimer = Math.max(0, controlled.atkTimer - dt);
if((keys['Space']||keys['KeyZ']||touch.attack) && controlled.atkCd <= 0){
  controlled.atkCd = controlled.atkCdMax;
  controlled.atkTimer = 250;
  // Hit French soldiers
  for(const f of napoleon.soldiers){
    if(!f.alive || f.dying) continue;
    const ddx = (f.x - controlled.x) * controlled.facing;
    const ddy = Math.abs(f.y - controlled.y);
    if(ddx > -10 && ddx < controlled.atkRange && ddy < 30){
      f.hp -= 20 + Math.floor(Math.random()*10);
      f.flash = 150;
      if(f.hp <= 0 && !f.dying){
        f.dying = true; f.dyingMs = 800; f.deathType = 'combat';
      }
      break; // one hit per swing
    }
  }
  // Attack bridges
  for(const b of bridges){
    if(b.intact && Math.abs(controlled.x - b.x) < 50 && controlled.y < GROUND_Y + 20){
      b.hp -= 15;
      addMessage(`Bridge damaged! (${Math.max(0,b.hp)}/${b.maxHp})`, 1000);
      if(b.hp <= 0){
        b.intact = false;
        addMessage('Bridge destroyed! Napoleon must rebuild!', 3000);
      }
      break;
    }
  }
  // Burn farms
  for(const farm of farms){
    if(farm.alive && !farm.burning && Math.abs(controlled.x - farm.x)<50){
      farm.burning = true;
      farm.burnTimer = 2000;
      addMessage('Farm burning! Scorched earth!', 2000);
    }
  }
}

}

// AI soldiers follow controlled soldier or attack nearest French
for(let i=0; i<russia.deployed.length; i++){
const s = russia.deployed[i];
if(!s.alive || s.dying || s.controlled) continue;
s.atkCd = Math.max(0, s.atkCd - dt);
if(s.atkTimer > 0) s.atkTimer = Math.max(0, s.atkTimer - dt);

// Find nearest French
let nearF = null, nearD = Infinity;
for(const f of napoleon.soldiers){
  if(!f.alive||f.dying) continue;
  const d = Math.hypot(f.x-s.x, f.y-s.y);
  if(d < nearD){ nearF=f; nearD=d; }
}

if(nearF && nearD < 200){
  // Attack
  const ddx = nearF.x - s.x, ddy = nearF.y - s.y;
  const dlen = Math.hypot(ddx,ddy)||1;
  s.facing = ddx > 0 ? 1 : -1;
  if(nearD > s.atkRange){
    s.x += (ddx/dlen) * s.speed * (dt/1000);
    s.y += (ddy/dlen) * s.speed * 0.4 * (dt/1000);
  } else if(s.atkCd <= 0){
    s.atkCd = s.atkCdMax; s.atkTimer = 250;
    nearF.hp -= 12 + Math.floor(Math.random()*6);
    nearF.flash = 150;
    if(nearF.hp <= 0 && !nearF.dying){
      nearF.dying = true; nearF.dyingMs = 800; nearF.deathType = 'combat';
    }
  }
} else if(controlled && controlled.alive){
  // Follow controlled soldier
  const ddx = controlled.x - s.x, ddy = controlled.y - s.y;
  const d = Math.hypot(ddx,ddy)||1;
  if(d > 50){
    s.x += (ddx/d) * s.speed * 0.5 * (dt/1000);
    s.y += (ddy/d) * s.speed * 0.3 * (dt/1000);
    s.facing = ddx > 0 ? 1 : -1;
  }
}
s.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, s.y));
s.walkTimer += dt;

}

updateDying(dt);
}

function updateCombat(dt){
// French soldiers fight back against nearby Russians
for(const f of napoleon.soldiers){
if(!f.alive||f.dying) continue;
f.walkTimer += dt;

let nearR = null, nearD = Infinity;
for(const r of russia.deployed){
  if(!r.alive||r.dying) continue;
  const d = Math.hypot(r.x-f.x, r.y-f.y);
  if(d < nearD){ nearR=r; nearD=d; }
}

if(nearR && nearD < 35){
  // French attacks Russian
  if(Math.random() < 0.002 * dt){
    nearR.hp -= 8 + Math.floor(Math.random()*6);
    nearR.flash = 150;
    if(nearR.hp <= 0 && !nearR.dying){
      nearR.dying = true; nearR.dyingMs = 800;
    }
  }
}

}
}

function updateFarmsAndBridges(dt){
for(const farm of farms){
if(farm.burning){
farm.burnTimer -= dt;
farm.food = Math.max(0, farm.food - dt * 0.02);
if(farm.burnTimer <= 0 || farm.food <= 0){
farm.alive = false;
farm.burning = false;
}
// Fire particles
if(Math.random() < 0.3){
particles.push({
x: farm.x + (Math.random()-0.5)*30,
y: GROUND_Y - 10 - Math.random()*40,
vx: (Math.random()-0.5)*1,
vy: -1-Math.random()*2,
life: 800+Math.random()*600,
maxLife: 1400,
r: 3+Math.random()*5,
color: Math.random()>0.4 ? COL.fire : COL.fireGlow,
});
}
}
}
}

// -- DRAWING --

// Parallax landscape background
// progress 0-1 = Niemen to Moscow
// Layer speeds: far=8%, mid=20% of camera scroll
function drawParallax(){
const progress = Math.max(0, Math.min(1, napoleon.x / MAP_WIDTH));
const camFar = camera.x * 0.08;
const camMid = camera.x * 0.20;
const winterFactor = Math.max(0, Math.min(1, (5 - temperature) / 30));

// -- FAR LAYER: distant hills / horizon --
// Hill silhouettes that slowly change colour with season
const hillBase = GROUND_Y - 20;
const hillCol = lerpColor(
  lerpColor('#6a8a5a', '#4a6a8a', Math.min(1, progress * 3)),  // green -> grey-blue forest
  '#9a9aaa', // winter grey
  winterFactor * 0.7
);

ctx.fillStyle = hillCol;
// Generate repeating hills using sine waves, offset by parallax
ctx.beginPath();
ctx.moveTo(0, hillBase);
for(let x = 0; x <= W; x += 4){
  const wx = x + camFar;
  const h = Math.sin(wx * 0.0015) * 30 +
            Math.sin(wx * 0.0031 + 1) * 18 +
            Math.sin(wx * 0.0007 + 2) * 50;
  ctx.lineTo(x, hillBase - 28 - h);
}
ctx.lineTo(W, GROUND_Y);
ctx.lineTo(0, GROUND_Y);
ctx.closePath();
ctx.fill();

// -- MID LAYER: trees / landscape features --
// Type transitions based on progress:
// 0-0.15 open farmland (Lithuania border), 0.15-0.45 birch forest,
// 0.45-0.70 dark pine/fir, 0.70-0.90 open steppe, 0.90-1.0 outskirts

const treeY = GROUND_Y - 2;

if(progress < 0.18){
  // Open rolling fields — scattered lone trees + haystacks
  drawScatteredTrees(camMid, treeY, winterFactor, 'oak', progress);
} else if(progress < 0.50){
  // Classic Russian birch forest — white trunks, light canopy
  drawBirchForest(camMid, treeY, winterFactor, progress);
} else if(progress < 0.72){
  // Dense dark pine / fir forest (Smolensk region)
  drawPineForest(camMid, treeY, winterFactor, progress);
} else if(progress < 0.92){
  // Open steppe / burned landscape approaching Moscow
  drawSteppe(camMid, treeY, winterFactor, progress);
} else {
  // Moscow outskirts — church/monastery silhouettes on horizon
  drawMoscowOutskirts(camMid, treeY, winterFactor);
}
}

function drawScatteredTrees(camOffset, treeY, winterFactor, type, progress){
// Sparse oak/elm trees + distant church spires
for(let i = 0; i < 18; i++){
  const seedX = (i * 1847 + 331) % 3200;
  const sx = ((seedX - camOffset % 3200) + 3200) % 3200 - 200;
  if(sx < -60 || sx > W + 60) continue;
  const h = 28 + (i * 13) % 22;
  const trunkW = 4 + (i * 7) % 4;
  // Trunk
  ctx.fillStyle = lerpColor('#5a4a30', '#8a8a8a', winterFactor * 0.5);
  ctx.fillRect(sx - trunkW/2, treeY - h, trunkW, h);
  // Canopy
  const leafAlpha = winterFactor > 0.5 ? 0.3 : 1;
  const leafCol = lerpColor(
    progress < 0.1 ? '#5a8a3a' : '#3a7a2a',
    '#8a8a6a',
    winterFactor
  );
  ctx.fillStyle = leafCol;
  ctx.globalAlpha = leafAlpha;
  ctx.beginPath(); ctx.arc(sx, treeY - h - 6, 14 + (i%3)*4, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}
// Distant village church silhouette
const churchX = ((800 - camOffset % 2000) + 2000) % 2000;
if(churchX < W + 60){
  ctx.fillStyle = lerpColor('#556055', '#666070', winterFactor);
  ctx.fillRect(churchX - 8, treeY - 45, 16, 45);
  ctx.beginPath(); ctx.moveTo(churchX-12, treeY-45); ctx.lineTo(churchX, treeY-62); ctx.lineTo(churchX+12, treeY-45); ctx.fill();
  // Onion dome silhouette
  ctx.beginPath(); ctx.arc(churchX, treeY-68, 8, Math.PI, 0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(churchX-4, treeY-74); ctx.quadraticCurveTo(churchX, treeY-82, churchX+4, treeY-74); ctx.fill();
}
}

function drawBirchForest(camOffset, treeY, winterFactor, progress){
// Dense birch grove — white trunks, shimmering leaves
const leafCol = lerpColor(
  progress < 0.32 ? '#a0c860' : '#c8a830',  // summer green -> autumn gold
  '#d8d8cc',
  winterFactor
);
const leafAlpha = winterFactor > 0.6 ? 0.25 : (winterFactor > 0.3 ? 0.6 : 1);
const treeSpacing = 28;

for(let i = 0; i < 40; i++){
  const seedX = (i * 919 + 127) % 4000;
  const sx = ((seedX - camOffset % 4000) + 4000) % 4000 - 40;
  if(sx < -50 || sx > W + 50) continue;
  const h = 32 + (i * 11) % 26;
  const lean = Math.sin(i * 2.3) * 3;
  // White/silver birch trunk
  ctx.fillStyle = lerpColor('#e8e8dc', '#c8c8c0', winterFactor * 0.3);
  ctx.fillRect(sx - 2 + lean, treeY - h, 4, h);
  // Bark markings
  ctx.fillStyle = 'rgba(80,70,60,0.35)';
  for(let m = 0; m < 3; m++) ctx.fillRect(sx - 2 + lean, treeY - h*0.3 - m*9, 4, 2);
  // Canopy
  ctx.fillStyle = leafCol;
  ctx.globalAlpha = leafAlpha;
  ctx.beginPath(); ctx.ellipse(sx + lean, treeY - h, 10 + (i%4)*3, 14 + (i%3)*3, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}
}

function drawPineForest(camOffset, treeY, winterFactor, progress){
// Dark fir/pine silhouettes
const pineCol = lerpColor('#1a3a1a', '#2a3a2a', winterFactor * 0.4);
const snowCol = 'rgba(220,230,240,0.7)';

for(let i = 0; i < 32; i++){
  const seedX = (i * 1373 + 89) % 3600;
  const sx = ((seedX - camOffset % 3600) + 3600) % 3600 - 50;
  if(sx < -50 || sx > W + 50) continue;
  const h = 38 + (i * 17) % 30;
  // Trunk
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(sx - 2, treeY - 12, 4, 12);
  // Pine triangle tiers
  ctx.fillStyle = pineCol;
  for(let t = 0; t < 3; t++){
    const ty = treeY - 12 - t * (h/3);
    const tw = 18 - t * 4;
    ctx.beginPath();
    ctx.moveTo(sx - tw, ty);
    ctx.lineTo(sx, ty - h/3 - 4);
    ctx.lineTo(sx + tw, ty);
    ctx.closePath(); ctx.fill();
    // Snow on branches in winter
    if(winterFactor > 0.4){
      ctx.fillStyle = snowCol;
      ctx.beginPath();
      ctx.moveTo(sx - tw * 0.7, ty);
      ctx.lineTo(sx, ty - 6);
      ctx.lineTo(sx + tw * 0.7, ty);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = pineCol;
    }
  }
}
}

function drawSteppe(camOffset, treeY, winterFactor, progress){
// Flat open steppe - burned fields, lonely dead trees, smoke columns
const burnProgress = (progress - 0.70) / 0.22;

// Scorched field texture
const fieldCol = lerpColor(
  lerpColor('#8a7a4a', '#5a3a1a', burnProgress),
  '#9a9088',
  winterFactor
);
ctx.fillStyle = fieldCol;
ctx.fillRect(0, treeY - 18, W, 18);

// Dead/stripped trees
for(let i = 0; i < 10; i++){
  const seedX = (i * 2131 + 557) % 5000;
  const sx = ((seedX - camOffset % 5000) + 5000) % 5000 - 40;
  if(sx < -40 || sx > W + 40) continue;
  const h = 22 + (i * 9) % 18;
  ctx.fillStyle = '#3a2a18';
  ctx.fillRect(sx - 2, treeY - h, 3, h);
  // Bare branches
  ctx.strokeStyle = '#3a2a18'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx, treeY-h); ctx.lineTo(sx-8, treeY-h+8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx, treeY-h); ctx.lineTo(sx+7, treeY-h+6); ctx.stroke();
}

// Distant smoke columns from burning villages
for(let i = 0; i < 3; i++){
  const seedX = (i * 3017 + 233) % 5000;
  const sx = ((seedX - camOffset % 5000) + 5000) % 5000 - 20;
  if(sx < 0 || sx > W) continue;
  ctx.strokeStyle = `rgba(80,70,60,${0.3 + burnProgress*0.3})`;
  ctx.lineWidth = 3 + i * 2;
  ctx.beginPath();
  for(let y = treeY - 15; y > treeY - 80; y -= 5){
    const wobble = Math.sin(gameTime * 0.001 + y * 0.1 + i) * 3;
    if(y === treeY - 15) ctx.moveTo(sx + wobble, y);
    else ctx.lineTo(sx + wobble, y);
  }
  ctx.stroke();
}
}

ctx.fillStyle=g;
ctx.fillRect(0,0,W,GROUND_Y);

function drawRivers(){

if(winterFactor > 0.3){
  ctx.fillStyle = `rgba(180,200,220,${winterFactor*0.4})`;
  ctx.fillRect(sx - river.width/2, GROUND_Y-5, river.width, H-GROUND_Y+5);
}

// Ripples
if(winterFactor < 0.7){
  ctx.strokeStyle = `rgba(90,138,186,${0.3*(1-winterFactor)})`;
  ctx.lineWidth = 1;
  for(let r=0; r<3; r++){
    const ry = GROUND_Y + 20 + r*30;
    const rOff = Math.sin(gameTime*0.001 + r*2) * 5;
    ctx.beginPath();
    ctx.moveTo(sx - river.width/2+5, ry+rOff);
    ctx.quadraticCurveTo(sx, ry-5+rOff, sx+river.width/2-5, ry+rOff);
    ctx.stroke();
  }
}

}
}

function drawBridges(){
for(const bridge of bridges){
const sx = bridge.x - camera.x;
if(sx < -100 || sx > W+100) continue;
if(!bridge.intact){
// Broken bridge remnants
ctx.fillStyle = '#4a3020';
ctx.fillRect(sx-bridge.width/2-5, GROUND_Y+25, 15, 8);
ctx.fillRect(sx+bridge.width/2-10, GROUND_Y+25, 15, 8);
// Broken planks in water
ctx.fillStyle = '#5a4030';
ctx.save(); ctx.translate(sx-10, GROUND_Y+40); ctx.rotate(0.3);
ctx.fillRect(-12,-3,24,6); ctx.restore();
continue;
}
// Intact bridge
ctx.fillStyle = COL.wood;
ctx.fillRect(sx-bridge.width/2-5, GROUND_Y+22, bridge.width+10, 18);
// Planks
ctx.strokeStyle = '#3a2818'; ctx.lineWidth=1;
for(let p=0; p<bridge.width; p+=8){
ctx.beginPath();
ctx.moveTo(sx-bridge.width/2+p, GROUND_Y+22);
ctx.lineTo(sx-bridge.width/2+p, GROUND_Y+40);
ctx.stroke();
}
// Rails
ctx.fillStyle = '#4a3828';
ctx.fillRect(sx-bridge.width/2-5, GROUND_Y+18, bridge.width+10, 5);

// HP bar if damaged
if(bridge.hp < bridge.maxHp){
  const pct = bridge.hp/bridge.maxHp;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(sx-25, GROUND_Y+8, 50, 6);
  ctx.fillStyle = pct>0.5?'#4a8a2a':'#c84020';
  ctx.fillRect(sx-25, GROUND_Y+8, 50*pct, 6);
}

}
}

function drawFarms(){
for(const farm of farms){

if(sx < -80 || sx > W+80) continue;
if(!farm.alive && !farm.burning){
// Charred remains
ctx.fillStyle='#2a2020';

continue;
}

// Farmhouse

ctx.fillRect(sx-15, GROUND_Y-25, 30, 25);
// Roof

ctx.beginPath();
ctx.moveTo(sx-20, GROUND_Y-25);
ctx.lineTo(sx, GROUND_Y-42);
ctx.lineTo(sx+20, GROUND_Y-25);
ctx.fill();
// Door
ctx.fillStyle='#3a2010';
ctx.fillRect(sx-4, GROUND_Y-14, 8, 14);

// Wheat fields
if(farm.food > 10){

  for(let w=0; w<8; w++){

}
}

function drawFrenchSoldier(s){
if(!s.alive && !s.dying) return;
const sx = Math.round(s.x - camera.x);
const sy = Math.round(s.y);
if(sx < -30 || sx > W+30) return;

ctx.save();
ctx.translate(sx, sy);

if(s.dying){
const alpha = Math.max(0, s.dyingMs / 800);
ctx.globalAlpha = alpha;
if(s.deathType==='freeze'){
ctx.filter = `saturate(0.2) brightness(1.4) hue-rotate(195deg)`;
} else if(s.deathType==='disease'){
ctx.filter = `saturate(0.4) hue-rotate(75deg) brightness(0.8)`;
}
ctx.rotate(Math.min(Math.PI/2, (1-alpha)*Math.PI/1.8) * s.facing);
}
if(s.flash > 0) ctx.filter = 'brightness(6)';

const wk = Math.floor(s.walkTimer/190)%2;
const f = s.facing;
const isRaider = s.role === 'raider';
const isVanguard = s.role === 'vanguard';

// Shadow

ctx.fillStyle='#111120';
ctx.fillRect(-4,-26,8,12);
// Brass top plate
ctx.fillStyle='#7a5a10';
ctx.fillRect(-4,-26,8,2);
// Leather peak / visor
ctx.fillStyle='#0a0a18';
ctx.fillRect(-6,-16,12,3);
// White band near brim
ctx.fillStyle='#cccccc';
ctx.fillRect(-4,-14,8,2);
// Plume (red for line infantry, white for guard, yellow for raider)
ctx.fillStyle = isRaider ? '#cc8800' : (isVanguard ? '#ffffff' : '#cc1a1a');
ctx.fillRect(-1,-31,3,6);
// Cockade (tricolor)
ctx.fillStyle='#cc1a1a'; ctx.fillRect(-2,-27,2,2);
ctx.fillStyle='#ffffff'; ctx.fillRect(0,-27,2,2);

// Head
ctx.fillStyle='#c8986a';
ctx.fillRect(-3,-13,7,8);
// Ear
ctx.fillRect(f>0?3:-4,-12,2,4);

// Dark blue coat body
ctx.fillStyle='#16246a';
ctx.fillRect(-6,-5,12,13);
// Red collar / lapel
ctx.fillStyle='#aa1a1a';
ctx.fillRect(-3,-5,6,4);
// White lapel facing
ctx.fillStyle='#d8d8d8';
ctx.fillRect(-2,-4,2,3);
ctx.fillRect(1,-4,2,3);
// Epaulette (red fringed shoulder decoration)
ctx.fillStyle='#cc1a1a';
ctx.fillRect(f>0?-6:-2,-5,4,3);
ctx.fillStyle='#ffaa00';
ctx.fillRect(f>0?-6:-2,-3,4,2);

// White cross-belts (cartridge box X pattern)
ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=1.5;
ctx.beginPath(); ctx.moveTo(-5,-4); ctx.lineTo(4,6); ctx.stroke();
ctx.beginPath(); ctx.moveTo(4,-4); ctx.lineTo(-5,6); ctx.stroke();
// Cartridge box (black square at belt)
ctx.fillStyle='#222'; ctx.fillRect(-3,4,6,4);

// White breeches (legs)
const lL=wk?2:-1, lR=wk?-1:2;
ctx.fillStyle='#d8d8d0';
ctx.fillRect(-5,8,4,8+lL);
ctx.fillRect(1,8,4,8+lR);

// Black tall boots
ctx.fillStyle='#111';
ctx.fillRect(-6,13+lL,5,5);
ctx.fillRect(0,13+lR,5,5);
// Boot top highlight
ctx.fillStyle='#333';
ctx.fillRect(-6,13+lL,5,2);
ctx.fillRect(0,13+lR,5,2);

// Musket with long barrel
ctx.fillStyle='#2a1a0a';
ctx.fillRect(f*7,-14,2,22);
// Musket lock (side metal parts)
ctx.fillStyle='#888';
ctx.fillRect(f*7-f*1,-10,f*2,4);

ctx.fillRect(f*7,-20,2,7);

ctx.restore();
}

function drawNapoleon(){

}

function drawProgressBar(){
const barW = 300, barH = 14;
const bx = W/2-barW/2, by = H-28;
ctx.fillStyle='rgba(0,0,0,0.6)';
ctx.beginPath(); ctx.roundRect(bx-4,by-4,barW+8,barH+8,6); ctx.fill();

ctx.fillStyle='#333'; ctx.fillRect(bx,by,barW,barH);

// Napoleon position on bar
const prog = Math.max(0, Math.min(1, napoleon.x / MOSCOW_X));
ctx.fillStyle='#2a3a6a'; ctx.fillRect(bx, by, barW*prog, barH);

// Moscow marker
ctx.fillStyle='#c84020'; ctx.fillRect(bx+barW-3, by, 3, barH);

// River markers
for(const r of rivers){
const rp = r.x / MOSCOW_X;
ctx.fillStyle=COL.water; ctx.fillRect(bx+barW*rp-1, by, 2, barH);
}

// Labels
ctx.fillStyle='#aaa'; ctx.font='9px "IM Fell English", serif'; ctx.textAlign='left';
ctx.fillText('Niemen', bx-2, by-2);
ctx.textAlign='right';
ctx.fillText('Moscow', bx+barW+2, by-2);
}

function drawMessages(){
let my = H/2 - 50;
for(const msg of messages){
const alpha = Math.min(1, msg.life / 500);
ctx.save(); ctx.globalAlpha=alpha;
ctx.fillStyle='rgba(0,0,0,0.7)';
const tw = ctx.measureText(msg.text).width || 300;
ctx.beginPath(); ctx.roundRect(W/2-tw/2-20, my-8, tw+40, 26, 6); ctx.fill();
ctx.fillStyle='#ffeedd';
ctx.font='13px "IM Fell English", serif';
ctx.textAlign='center';
ctx.fillText(msg.text, W/2, my+8);
ctx.restore();
my += 32;
}
}

function drawMoscowChoice(){
ctx.fillStyle='rgba(0,0,0,0.7)';
ctx.fillRect(0,0,W,H);

ctx.fillStyle='#c8a040';
ctx.font='bold 26px Cinzel, serif'; ctx.textAlign='center';
ctx.fillText('Napoleon has reached Moscow!', W/2, H/2-60);

ctx.fillStyle='#ccc'; ctx.font='15px "IM Fell English", serif';
ctx.fillText('The city is yours to defend or destroy.', W/2, H/2-30);
ctx.fillText('Will you burn Moscow to deny Napoleon shelter and supplies?', W/2, H/2-8);

const btnY = H/2+20;

// BURN button
ctx.fillStyle='#8a2020';
ctx.beginPath(); ctx.roundRect(W/2-220, btnY, 200, 50, 8); ctx.fill();
ctx.fillStyle='#ff8040'; ctx.font='bold 18px Cinzel, serif';
ctx.fillText('🔥 Burn Moscow', W/2-120, btnY+32);

// SURRENDER button
ctx.fillStyle='#2a4a2a';
ctx.beginPath(); ctx.roundRect(W/2+20, btnY, 200, 50, 8); ctx.fill();
ctx.fillStyle='#80c080'; ctx.font='bold 18px Cinzel, serif';
ctx.fillText('Surrender', W/2+120, btnY+32);
}

function getSeasonLabel(){
const progress = napoleon.x / MOSCOW_X;
if(phase==='retreat'){
const rp = retreatTime / 120000;
if(rp < 0.2) return 'October 1812';
if(rp < 0.5) return 'November 1812';
return 'December 1812';
}
if(progress < 0.15) return 'June 1812';
if(progress < 0.35) return 'July 1812';
if(progress < 0.55) return 'August 1812';
if(progress < 0.75) return 'September 1812';
return 'September 1812';
}

// -- TITLE SCREEN --
function drawTitle(){
// Dark background
const g = ctx.createLinearGradient(0,0,0,H);
g.addColorStop(0,'#0a0a18');
g.addColorStop(0.5,'#1a1a2a');
g.addColorStop(1,'#0a0a10');
ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

// Snow
ctx.fillStyle='rgba(255,255,255,0.4)';
for(let i=0;i<80;i++){
const sx=(gameTime*0.015*(i%3+1)+i*73)%W;
const sy=(gameTime*0.02*(i%2+1)+i*31)%H;
ctx.fillRect(sx,sy,2,2);
}

ctx.textAlign='center';

// Title
ctx.fillStyle='#c8a040';
ctx.font='bold 44px Cinzel, serif';
ctx.fillText('1812', W/2, H/2-100);

ctx.fillStyle='#8a7a5a';
ctx.font='italic 18px "IM Fell English", serif';
ctx.fillText('The Retreat Will Teach Them', W/2, H/2-65);

ctx.fillStyle='#888';
ctx.font='14px "IM Fell English", serif';
ctx.fillText('You are Russia. Napoleon marches on Moscow with 100,000 men.', W/2, H/2-25);
ctx.fillText('Deploy soldiers. Burn farms. Destroy bridges.', W/2, H/2);
ctx.fillText('Let General Winter finish what your army cannot.', W/2, H/2+25);

// Controls
ctx.fillStyle='#666'; ctx.font='12px "IM Fell English", serif';
ctx.fillText('Use + to add soldiers to your force, then Send into Battle  ·  WASD to move  ·  SPACE to attack', W/2, H/2+55);

// Start button
ctx.fillStyle='#2a5a2a';
ctx.beginPath(); ctx.roundRect(W/2-120, H/2+80, 240, 50, 10); ctx.fill();
ctx.strokeStyle='#4a8a4a'; ctx.lineWidth=2;
ctx.beginPath(); ctx.roundRect(W/2-120, H/2+80, 240, 50, 10); ctx.stroke();
ctx.fillStyle='#ddd'; ctx.font='bold 20px Cinzel, serif';
ctx.fillText('Begin the Campaign', W/2, H/2+112);
}

// -- VICTORY / DEFEAT SCREENS --
function drawEndScreen(){
ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
ctx.textAlign='center';

if(phase==='gameover_win'){
const aliveF = napoleon.soldiers.filter(s=>s.alive&&!s.dying).length;

ctx.fillStyle='#c8a040'; ctx.font='bold 32px Cinzel, serif';
ctx.fillText('Russia Endures', W/2, H/2-100);

ctx.fillStyle='#aaa'; ctx.font='16px "IM Fell English", serif';
if(aliveF <= 0){
  ctx.fillText('The Grande Armée has been annihilated.', W/2, H/2-60);
} else {
  ctx.fillText(`Only ${aliveF} of 100,000 soldiers stumble back across the Niemen.`, W/2, H/2-60);
}
ctx.fillText(`You deployed ${russia.totalDeployed} Russian soldiers.`, W/2, H/2-35);

ctx.fillStyle='#888'; ctx.font='italic 14px "IM Fell English", serif';
ctx.fillText('It was not your army that defeated Napoleon.', W/2, H/2-5);
ctx.fillText('It was the land itself  - the burned fields, the broken bridges, the frozen roads.', W/2, H/2+15);
ctx.fillText('The system was unwinnable. Napoleon just hadn\'t realized it yet.', W/2, H/2+35);

ctx.fillStyle='#2a5a2a';
ctx.beginPath(); ctx.roundRect(W/2-100,H/2+65,200,45,8); ctx.fill();
ctx.fillStyle='#ddd'; ctx.font='bold 16px Cinzel, serif';
ctx.fillText('Play Again', W/2, H/2+94);

}
else if(phase==='napoleon_wins'){
ctx.fillStyle='#4a2a2a'; ctx.font='bold 28px Cinzel, serif';
ctx.fillText('Napoleon Triumphant', W/2, H/2-60);
ctx.fillStyle='#aaa'; ctx.font='15px "IM Fell English", serif';
ctx.fillText('Moscow is his. Without scorched earth, he resupplies and holds the city.', W/2, H/2-25);
ctx.fillText('History teaches: the only winning move was to burn it all.', W/2, H/2);

ctx.fillStyle='#6a2a2a';
ctx.beginPath(); ctx.roundRect(W/2-100,H/2+65,200,45,8); ctx.fill();
ctx.fillStyle='#ddd'; ctx.font='bold 16px Cinzel, serif';
ctx.fillText('Try Again', W/2, H/2+94);

}
else if(phase==='burned'){
ctx.fillStyle='#c85020'; ctx.font='bold 28px Cinzel, serif';
ctx.fillText('Moscow Burns', W/2, H/2-80);

ctx.fillStyle='#ccc'; ctx.font='16px "IM Fell English", serif';
ctx.fillText('The flames consume everything. Napoleon has nothing.', W/2, H/2-40);
ctx.fillText('No shelter. No food. Winter is coming.', W/2, H/2-15);
ctx.fillText('He has no choice but to march 100 leagues back through the snow.', W/2, H/2+10);

ctx.fillStyle='#2a4a6a';
ctx.beginPath(); ctx.roundRect(W/2-100,H/2+50,200,45,8); ctx.fill();
ctx.fillStyle='#ddd'; ctx.font='bold 16px Cinzel, serif';
ctx.fillText('The Retreat Begins', W/2, H/2+79);

}
}

// -- BRIDGE BUILDING INDICATOR --
function drawBridgeBuildIndicator(){
if(!napoleon.buildingBridge) return;
const sx = napoleon.x - camera.x;
const pct = napoleon.bridgeBuildTime / napoleon.bridgeBuildMax;
ctx.fillStyle='rgba(0,0,0,0.6)';
ctx.beginPath(); ctx.roundRect(sx-60, GROUND_Y-20, 120, 20, 4); ctx.fill();
ctx.fillStyle='#c8a040';
ctx.fillRect(sx-56, GROUND_Y-17, 112*pct, 14);
ctx.fillStyle='#fff'; ctx.font='10px Cinzel, serif'; ctx.textAlign='center';
ctx.fillText('Building Bridge...', sx, GROUND_Y-6);
}

// -- UTILITY --
function lerpColor(a, b, t){
const ah=parseInt(a.slice(1),16), bh=parseInt(b.slice(1),16);
const ar=(ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
const br=(bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
const rr=Math.round(ar+(br-ar)*t);
const rg=Math.round(ag+(bg-ag)*t);
const rb=Math.round(ab+(bb-ab)*t);
return `rgb(${rr},${rg},${rb})`;
}

// -- MAIN DRAW --
function draw(){
ctx.clearRect(0,0,W,H);

if(phase==='title'){
drawTitle(); return;
}
if(phase==='gameover_win'||phase==='gameover_lose'||phase==='napoleon_wins'||phase==='burned'){
// Draw the world behind the overlay
drawSky(); drawParallax(); drawGround(); drawRivers(); drawBridges(); drawFarms(); drawMoscow();
// Sort and draw all soldiers
const all = [...napoleon.soldiers.filter(s=>s.alive||s.dying), ...russia.deployed.filter(s=>s.alive||s.dying)];
all.sort((a,b)=>a.y-b.y);
for(const s of all){
if(napoleon.soldiers.includes(s)) drawFrenchSoldier(s);
else drawRussianSoldier(s);
}
drawNapoleon();
drawParticles();
drawEndScreen();
return;
}

drawSky();
drawParallax();
drawGround();
drawRivers();
drawBridges();
drawFarms();
drawMoscow();

// Z-sort all soldiers
const all = [...napoleon.soldiers.filter(s=>s.alive||s.dying), ...russia.deployed.filter(s=>s.alive||s.dying)];
all.push({_isNapoleon:true, y:GROUND_Y+35, alive:true});
all.sort((a,b)=>a.y-b.y);
for(const s of all){
if(s._isNapoleon){ drawNapoleon(); continue; }
if(napoleon.soldiers.includes(s)) drawFrenchSoldier(s);
else drawRussianSoldier(s);
}

drawParticles();
drawBridgeBuildIndicator();
drawHUD();
}

function drawParticles(){
for(const p of particles){
const sx = p.x - camera.x;
const alpha = p.life / p.maxLife;
ctx.save(); ctx.globalAlpha=alpha;
ctx.fillStyle=p.color;
ctx.beginPath(); ctx.arc(sx, p.y, p.r*alpha, 0, Math.PI*2); ctx.fill();
ctx.restore();
}
}

// -- GAME LOOP --
let lastTs=0;
function loop(ts){
const dt=Math.min(50, ts-lastTs);
lastTs=ts;
if(phase!=='title') update(dt);
else gameTime += dt; // for title animation
draw();
requestAnimationFrame(loop);
}

requestAnimationFrame(ts=>{ lastTs=ts; requestAnimationFrame(loop); });
</script>
