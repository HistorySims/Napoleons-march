function drawSupplyWagons(){
if(!napoleon.wagons) return;
const foodRatio = Math.max(0, napoleon.food / napoleon.maxFood);
for(let i=0; i<napoleon.wagons.length; i++){
const wag = napoleon.wagons[i];
const sx = Math.round(wag.x - camera.x);
const sy = GROUND_Y + 44 + wag.offsetZ;
if(sx < -80 || sx > W+80) continue;
const wobbleX = Math.sin(wag.wobble) * 1.5;
ctx.save();
ctx.translate(sx + wobbleX, sy);

// Shadow
ctx.fillStyle='rgba(0,0,0,0.2)';
ctx.beginPath(); ctx.ellipse(0,4,22,5,0,0,Math.PI*2); ctx.fill();

// Wagon bed (brown wood)
ctx.fillStyle='#6a4a20';
ctx.fillRect(-20,-10,40,12);
// Planks
ctx.strokeStyle='#4a3010'; ctx.lineWidth=0.8;
for(let p=-18;p<20;p+=7){ ctx.beginPath(); ctx.moveTo(p,-10); ctx.lineTo(p,2); ctx.stroke(); }
// Side boards
ctx.fillStyle='#7a5a28';
ctx.fillRect(-20,-14,40,4);
ctx.fillRect(-20,-1,40,4);

// Food load on wagon — scale height by food ratio (divided among 3 wagons)
const loadRatio = Math.max(0, foodRatio - i * 0.08); // back wagons empty first
if(loadRatio > 0.05){
  const lh = Math.round(loadRatio * 14) + 2;
  // Sacks / barrels
  ctx.fillStyle='#c8a030';
  ctx.fillRect(-18,-14-lh,36,lh);
  // Rope over top
  ctx.strokeStyle='#5a3a10'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(-18,-14-lh+2);
  ctx.quadraticCurveTo(0,-14-lh-3,18,-14-lh+2);
  ctx.stroke();
  // Highlight top sacks
  ctx.fillStyle='#dab040';
  ctx.fillRect(-16,-14-lh,32,3);
  // Show barrels if >50% full
  if(loadRatio > 0.5){
    ctx.fillStyle='#8a4820';
    ctx.beginPath(); ctx.ellipse(-10,-14-lh+4,6,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#6a3810';
    ctx.fillRect(-14,-14-lh+2,2,6); ctx.fillRect(-4,-14-lh+2,2,6);
  }
}

// Front/back boards
ctx.fillStyle='#5a3818';
ctx.fillRect(-22,-12,4,14);
ctx.fillRect(18,-12,4,14);

// Wheels (2 per side visible)
const wx = [-14, 12];
for(const wox of wx){
  ctx.strokeStyle='#3a2408'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(wox, 4, 8, 0, Math.PI*2); ctx.stroke();
  // Spokes
  ctx.lineWidth=1.5;
  for(let sp=0;sp<6;sp++){
    const a = sp*Math.PI/3 + wag.wobble*0.5;
    ctx.beginPath();
    ctx.moveTo(wox,4);
    ctx.lineTo(wox+Math.cos(a)*7, 4+Math.sin(a)*7);
    ctx.stroke();
  }
  // Hub
  ctx.fillStyle='#8a6030';
  ctx.beginPath(); ctx.arc(wox,4,2.5,0,Math.PI*2); ctx.fill();
}

// Axle
ctx.fillStyle='#4a3010';
ctx.fillRect(-16,1,32,3);

ctx.restore();
}
}

function drawNapoleon(){

function getSeasonLabel(){
const progress = napoleon.x / MOSCOW_X;
if(phase==='retreat'){
const rp = retreatTime / 120000;
if(rp < 0.2) return 'October 1812';
if(rp < 0.5) return 'November 1812';
return 'December 1812';
}
if(progress < 0.15) return 'June 1812';
if(progress < 0.35) return 'July 1812';
if(progress < 0.55) return 'August 1812';
if(progress < 0.75) return 'September 1812';
return 'September 1812';
}

// -- UTILITY --
function lerpColor(a, b, t){
const ah=parseInt(a.slice(1),16), bh=parseInt(b.slice(1),16);
const ar=(ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
const br=(bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
const rr=Math.round(ar+(br-ar)*t);
const rg=Math.round(ag+(bg-ag)*t);
const rb=Math.round(ab+(bb-ab)*t);
return `rgb(${rr},${rg},${rb})`;
}

// -- MAIN DRAW --
function draw(){
ctx.clearRect(0,0,W,H);

if(phase==='title'){
drawTitle(); return;
}
if(phase==='gameover_win'||phase==='gameover_lose'||phase==='napoleon_wins'||phase==='burned'){
// Draw the world behind the overlay
drawSky(); drawParallax(); drawGround(); drawRivers(); drawBridges(); drawFarms(); drawMoscow(); drawSupplyWagons();
// Sort and draw all soldiers (include frozen corpses)
const all = [...napoleon.soldiers.filter(s=>s.alive||s.dying||s.frozenBody), ...russia.deployed.filter(s=>s.alive||s.dying)];
all.sort((a,b)=>a.y-b.y);
for(const s of all){
if(napoleon.soldiers.includes(s)) drawFrenchSoldier(s);
else drawRussianSoldier(s);
}
drawNapoleon();
drawParticles();
drawGhosts();
drawSnow();
drawEndScreen();
return;
}

drawSky();
drawParallax();
drawGround();
drawRivers();
drawBridges();
drawFarms();
drawMoscow();
drawSupplyWagons();

// Z-sort all soldiers (include frozen corpses)
const all = [...napoleon.soldiers.filter(s=>s.alive||s.dying||s.frozenBody), ...russia.deployed.filter(s=>s.alive||s.dying)];
all.push({_isNapoleon:true, y:GROUND_Y+35, alive:true});
all.sort((a,b)=>a.y-b.y);
for(const s of all){
if(s._isNapoleon){ drawNapoleon(); continue; }
if(napoleon.soldiers.includes(s)) drawFrenchSoldier(s);
else drawRussianSoldier(s);
}

drawParticles();
drawGhosts();
drawSnow();
drawBridgeBuildIndicator();
drawHUD();
}

function drawParticles(){
for(const p of particles){
const sx = p.x - camera.x;
const alpha = p.life / p.maxLife;
ctx.save(); ctx.globalAlpha=alpha;
ctx.fillStyle=p.color;
ctx.beginPath(); ctx.arc(sx, p.y, p.r*alpha, 0, Math.PI*2); ctx.fill();
ctx.restore();
}
}

function drawGhosts(){
ctx.save();
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
for(const g of ghosts){
  const sx = g.x - camera.x;
  if(sx < -40 || sx > W+40) continue;
  const alpha = Math.max(0, g.life / g.maxLife);
  const scale = 0.6 + (1 - g.life/g.maxLife) * 0.8;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `${Math.round(22*scale)}px serif`;
  ctx.fillText('👻', sx, g.y);
  ctx.restore();
}
ctx.restore();
}

function drawSnow(){
if(snowflakes.length === 0) return;
ctx.save();
for(const fl of snowflakes){
  const alpha = Math.min(1, (H - fl.y + 50) / 80); // fade in from top, fade near ground
  ctx.globalAlpha = Math.max(0, alpha) * 0.82;
  ctx.fillStyle = '#e8eef8';
  ctx.beginPath();
  ctx.arc(fl.x, fl.y, fl.r, 0, Math.PI*2);
  ctx.fill();
}
ctx.restore();
}

// -- GAME LOOP --
let lastTs=0;
function loop(ts){
const dt=Math.min(50, ts-lastTs);
lastTs=ts;
if(phase!=='title') update(dt);
else gameTime += dt; // for title animation
draw();
requestAnimationFrame(loop);
}

requestAnimationFrame(ts=>{ lastTs=ts; requestAnimationFrame(loop); });
</script>
