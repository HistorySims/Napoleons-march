<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>1812 — The Retreat Will Teach Them</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;overflow:hidden;font-family:'IM Fell English',serif}
#wrap{position:relative;width:1000px;max-width:100vw;aspect-ratio:1000/560;flex-shrink:0}
canvas{display:block;width:100%;height:100%;cursor:default}

/* Mobile deploy panel — sits below the canvas in the dead space */
#mobile-deploy{
  display:none;
  width:100vw;
  background:rgba(8,18,8,0.97);
  border-top:1.5px solid #3a7a3a;
  padding:10px 16px 14px;
  flex-direction:column;
  gap:8px;
  flex-shrink:0;
}
#md-header{
  display:flex;justify-content:space-between;align-items:center;
  color:#aad4aa;font-family:'IM Fell English',serif;font-size:13px;
}
#md-controls{display:flex;align-items:center;gap:8px}
.md-btn{
  background:#1a2a1a;border:1.5px solid #3a7a3a;color:#ccffcc;
  font-family:Cinzel,serif;font-size:16px;font-weight:bold;
  width:38px;height:38px;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.md-btn:active{background:#2a4a2a}
.md-btn:disabled{background:#111;border-color:#333;color:#444}
#md-count{
  background:#111;border:1px solid #333;color:#fff;
  font-family:Cinzel,serif;font-size:16px;font-weight:bold;
  width:52px;height:38px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  letter-spacing:1px;
}
#md-send{
  flex:1;height:38px;background:#1a4a1a;border:1.5px solid #3a8a3a;
  color:#ccffcc;font-family:Cinzel,serif;font-size:13px;font-weight:bold;
  border-radius:6px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
#md-send:active{background:#2a6a2a}
#md-send:disabled{background:#111;border-color:#333;color:#444}
#md-in-battle{
  display:none;align-items:center;gap:10px;
  color:#aaffaa;font-family:Cinzel,serif;font-size:13px;
}
#md-in-battle-label{flex:1}

@media(max-width:768px){
  #wrap{width:100vw;max-width:none;aspect-ratio:1000/560;height:auto}
  body{justify-content:flex-start;align-items:stretch}
  #mobile-deploy{display:flex}
}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="mobile-deploy">
  <!-- Shown when NOT inBattle -->
  <div id="md-idle">
    <div id="md-header">
      <span>Russian Reserve: <strong id="md-bank">50</strong></span>
      <span style="color:#666;font-size:11px">Add soldiers, then deploy</span>
    </div>
    <div id="md-controls">
      <button class="md-btn" id="md-minus">−</button>
      <div id="md-count">0</div>
      <button class="md-btn" id="md-plus">+</button>
      <button id="md-send">&#x2694; Send into Battle</button>
    </div>
  </div>
  <!-- Shown when inBattle -->
  <div id="md-in-battle">
    <span id="md-in-battle-label">&#x2694; In Battle — WASD + Space to fight</span>
  </div>
</div>
<script>
'use strict';

const W=1000, H=560;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

// -- GAME CONSTANTS --
const MAP_WIDTH = 12000;
const MOSCOW_X = MAP_WIDTH - 400;
const GROUND_Y = 340;
const LANE_TOP = 258, LANE_BOT = 495;
const DEPLOY_ZONE_X = 150;

// -- COLORS --
const COL = {
sky1:'#b8c6d4', sky2:'#8a9bb0', sky3:'#5a6a7a',
ground:'#8a9a6a', groundWinter:'#c8c8d0',
snow:'#e8e8f0', road:'#6a6050', roadSnow:'#9a9a9f',
russian:'#1a5a2a', russianLight:'#2a7a3a',
french:'#1a2a6a', frenchLight:'#2a3a8a',
gold:'#c4a020', blood:'#8a1a1a',
fire:'#e85020', fireGlow:'#ff8040',
ice:'#4a8aff', sick:'#4a8a2a',
wood:'#5a4030', water:'#3a5a8a', waterLight:'#5a8aba',
farm:'#aa8a50', wheat:'#c8a830',
};

// -- GAME STATE --
let phase = 'title'; // title | playing | burned | napoleon_wins | retreat | gameover_win | gameover_lose
let camera = { x: 0 };
let temperature = 15; // Celsius, drops as Napoleon approaches Moscow and during retreat
let gameTime = 0;
let retreatTime = 0;

// Napoleon's army
let napoleon = {
x: 200, y: GROUND_Y + 40,
soldiers: [],
food: 800,
maxFood: 800,
speed: 38,
alive: true,
retreating: false,
stopped: false,
stopTimer: 0,
atMoscow: false,
buildingBridge: false,
bridgeBuildTime: 0,
bridgeBuildMax: 3000,
wagons: [],         // supply wagons following the army
workerIds: [],      // ids of soldiers assigned as bridge workers
buildBridgeX: 0,    // x of bridge being built
};

// Russian forces
let russia = {
bank: 50,
deployed: [],
controlledIdx: -1,
totalDeployed: 0,
pendingSoldiers: 0,
inBattle: false,
sharedFarmTarget: null,
sharedBridgeTarget: null,
};

// Moscow city state
let moscow = { hp: 300, maxHp: 300, burned: false };

// Map features
let farms = [];
let bridges = [];
let rivers = [];
let mapFeatures = [];

// Player input
let keys = {};
let mouse = { x:0, y:0, down:false };
let dragFromBank = false;
const isMobile = 'ontouchstart' in window;
const touch = { jx:0, jy:0, jActive:false, jSX:0, jSY:0, attack:false, atkId:-1, jId:-1 };
const JR=48, JCX=75, JCY=H-85, ACX=W-75, ACY=H-85, AR=46;

// -- MOBILE DEPLOY PANEL --
const mdBank    = document.getElementById('md-bank');
const mdCount   = document.getElementById('md-count');
const mdMinus   = document.getElementById('md-minus');
const mdPlus    = document.getElementById('md-plus');
const mdSend    = document.getElementById('md-send');
const mdIdle    = document.getElementById('md-idle');
const mdBattle  = document.getElementById('md-in-battle');

function syncMobilePanel(){
  if(!isMobile) return;
  if(mdBank)  mdBank.textContent  = russia.bank;
  if(mdCount) mdCount.textContent = russia.pendingSoldiers;
  if(mdMinus) mdMinus.disabled = russia.pendingSoldiers <= 0;
  if(mdPlus)  mdPlus.disabled  = russia.bank <= 0;
  if(mdSend)  mdSend.disabled  = russia.pendingSoldiers <= 0;
  const inBattle = russia.inBattle;
  if(mdIdle)   mdIdle.style.display   = inBattle ? 'none'  : 'block';
  if(mdBattle) mdBattle.style.display = inBattle ? 'flex'  : 'none';
}

if(mdMinus) mdMinus.addEventListener('click', () => {
  if(russia.pendingSoldiers > 0){ russia.pendingSoldiers--; russia.bank++; syncMobilePanel(); }
});
if(mdPlus) mdPlus.addEventListener('click', () => {
  if(russia.bank > 0){ russia.pendingSoldiers++; russia.bank--; syncMobilePanel(); }
});
if(mdSend) mdSend.addEventListener('click', () => {
  if(russia.pendingSoldiers > 0 && (phase==='playing'||phase==='retreat')){ sendIntoBattle(); syncMobilePanel(); }
});

// Effects
let effects = [];
let particles = [];
let messages = [];
let ghosts = [];
let snowflakes = [];

// -- INPUT --
window.addEventListener('keydown', e => { keys[e.code]=true; });
window.addEventListener('keyup', e => { keys[e.code]=false; });

function toCanvas(cx,cy){
const r=canvas.getBoundingClientRect();
return [(cx-r.left)*(W/r.width),(cy-r.top)*(H/r.height)];
}

canvas.addEventListener('mousedown', e => {
const [mx,my]=toCanvas(e.clientX,e.clientY);
mouse.x=mx; mouse.y=my; mouse.down=true;
handleMouseDown(mx,my);
});
canvas.addEventListener('mousemove', e => {
const [mx,my]=toCanvas(e.clientX,e.clientY);
mouse.x=mx; mouse.y=my;
});
canvas.addEventListener('mouseup', e => {
const [mx,my]=toCanvas(e.clientX,e.clientY);
mouse.down=false;
handleMouseUp(mx,my);
});
canvas.addEventListener('click', e => {
const [mx,my]=toCanvas(e.clientX,e.clientY);
handleClick(mx,my);
});

// Touch support  - multi-touch for joystick, attack, and deploy drag
canvas.addEventListener('touchstart', e => {
e.preventDefault();
for(const t of e.changedTouches){
const [tx,ty]=toCanvas(t.clientX,t.clientY);

// Title / end screen taps
if(phase==='title'||phase==='burned'||phase==='napoleon_wins'||phase==='gameover_win'||phase==='gameover_lose'
  ||(phase==='playing'&&napoleon.atMoscow)){
  handleClick(tx,ty);
  continue;
}

// Attack button area (right side, bottom)
if(tx > W-140 && ty > H-150){
  touch.attack=true; touch.atkId=t.identifier;
  continue;
}
// Joystick area (left side, bottom)  - only when inBattle
if(russia.inBattle && tx < 160 && ty > H-160){
  touch.jActive=true; touch.jId=t.identifier;
  touch.jSX=tx; touch.jSY=ty; touch.jx=0; touch.jy=0;
  continue;
}
// Deploy box button taps
handleClick(tx,ty);

}
},{passive:false});

canvas.addEventListener('touchmove', e => {
e.preventDefault();
for(const t of e.changedTouches){
const [tx,ty]=toCanvas(t.clientX,t.clientY);
if(t.identifier===touch.jId && touch.jActive){
let dx=tx-touch.jSX, dy=ty-touch.jSY;
const len=Math.sqrt(dx*dx+dy*dy);
if(len>JR){dx*=JR/len;dy*=JR/len;}
touch.jx=dx/JR; touch.jy=dy/JR;
}
}
},{passive:false});

canvas.addEventListener('touchend', e => {
e.preventDefault();
for(const t of e.changedTouches){
if(t.identifier===touch.jId){
touch.jActive=false; touch.jx=0; touch.jy=0; touch.jId=-1;
}
if(t.identifier===touch.atkId){
touch.attack=false; touch.atkId=-1;
}
}
},{passive:false});

// -- MAP GENERATION --
function buildMap(){
farms=[]; bridges=[]; rivers=[];

// Rivers with bridges
const riverPositions = [1800, 3600, 5400, 7200, 9000, 10500];
for(const rx of riverPositions){
rivers.push({ x:rx, width:80 });
bridges.push({ x:rx, intact:true, hp:100, maxHp:100, width:80 });
}

// Farm types: farmhouse, barn, windmill, cottage
const FARM_TYPES = ['farmhouse','barn','windmill','cottage'];
// Farms on both sides of the road
for(let i=0; i<26; i++){
  const fx = 500 + i * 420 + (Math.random()-0.5)*140;
  if(rivers.some(r => Math.abs(r.x - fx)<120)) continue;
  // Alternate above / below road, with some randomness
  const aboveRoad = (i % 2 === 0) || Math.random() < 0.3;
  const fy = aboveRoad
    ? GROUND_Y + 14 + Math.floor(Math.random()*8)    // north strip: just above the road (y 354-362)
    : GROUND_Y + 140 + Math.floor(Math.random()*14); // south strip: lower field near bottom (y 480-494)
  farms.push({
    x: fx, y: fy,
    food: 28 + Math.floor(Math.random()*22),
    maxFood: 50,
    alive: true,
    burning: false,
    burnTimer: 0,
    farmHp: 3,
    isHouse: false,
    type: FARM_TYPES[i % 4],
  });
}
// Village houses densely clustered near Moscow (x 8000-11200), both sides
for(let i=0; i<14; i++){
  const fx = 8000 + i * 240 + (Math.random()-0.5)*100;
  if(rivers.some(r => Math.abs(r.x - fx)<120)) continue;
  const aboveRoad = i % 2 === 0;
  const fy = aboveRoad
    ? GROUND_Y + 14 + Math.floor(Math.random()*8)    // north strip above road
    : GROUND_Y + 140 + Math.floor(Math.random()*12); // south strip near bottom
  farms.push({
    x: fx, y: fy,
    food: 18 + Math.floor(Math.random()*14),
    maxFood: 32,
    alive: true,
    burning: false,
    burnTimer: 0,
    farmHp: 3,
    isHouse: true,
    type: 'farmhouse',
  });
}
}

// -- ENTITY CREATION --
function createFrenchSoldier(x, y, role){
return {
x, y: y || GROUND_Y + 20 + Math.random()*60,
hp: 100, maxHp: 100,
alive: true,
dying: false, dyingMs: 0,
deathType: null,
speed: napoleon.speed + (Math.random()-0.5)*8,
walkTimer: Math.random()*1000,
facing: 1,
frozen: 0,
frozenBody: false,
exclamTimer: 0,
diseased: false,
sickness: 0,        // 0-1 green disease progression
flash: 0,
knockVX: 0,         // knockback velocity x
knockTimer: 0,
offsetY: (Math.random()-0.5)*40,
role: role || 'column', // 'vanguard','column','raider','worker'
raidTarget: null,
raidReturning: false,
carrying: false,    // raider carrying food
carryFood: 0,
hammerAngle: 0,     // bridge worker hammer animation
id: Math.random(),
};
}

function createRussianSoldier(x, y){
return {
x, y: y || GROUND_Y + 30 + Math.random()*50,
hp: 100, maxHp: 100,
alive: true,
dying: false, dyingMs: 0,
speed: 55,
walkTimer: Math.random()*1000,
facing: -1,
atkCd: 0, atkCdMax: 700,
atkTimer: 0,
atkRange: 36,
flash: 0,
knockVX: 0,
knockTimer: 0,
controlled: false,
id: Math.random(),
};
}

function initNapoleonArmy(){
napoleon.soldiers = [];
// Vanguard: advance scouts spread ahead of Napoleon
for(let i=0; i<12; i++){
const x = 260 + Math.random()*100;
const s = createFrenchSoldier(x, undefined, 'vanguard');
s.offsetY = (Math.random()-0.5)*50;
napoleon.soldiers.push(s);
}
// Main column: stretched behind Napoleon
for(let i=0; i<78; i++){
const x = 80 + Math.random()*180;
const s = createFrenchSoldier(x, undefined, 'column');
napoleon.soldiers.push(s);
}
// Raiders: small parties of 2-3 that visibly detach to forage farms
for(let i=0; i<3; i++){
const x = 120 + Math.random()*150;
const s = createFrenchSoldier(x, undefined, 'raider');
napoleon.soldiers.push(s);
}
napoleon.food = 800;
napoleon.x = 200;
napoleon.retreating = false;
napoleon.atMoscow = false;
napoleon.stopped = false;
napoleon.buildingBridge = false;
napoleon.bridgeBuildTime = 0;
napoleon.workerIds = [];
napoleon.buildBridgeX = 0;
// Supply wagons: 3 carts following the column
napoleon.wagons = [
{x: napoleon.x - 120, y: GROUND_Y + 42, wobble: 0, offsetZ: -8},
{x: napoleon.x - 200, y: GROUND_Y + 38, wobble: Math.PI, offsetZ: 6},
{x: napoleon.x - 290, y: GROUND_Y + 44, wobble: Math.PI*0.7, offsetZ: -4},
];
}

// -- HANDLE INPUT --
function handleMouseDown(mx, my){
// no drag-to-deploy; clicks handled by handleClick
}

function handleMouseUp(mx, my){
}

function handleClick(mx, my){
if(phase==='title'){
// Check start button
if(mx > W/2-120 && mx < W/2+120 && my > H/2+80 && my < H/2+130){
startGame();
}
return;
}
if(phase==='burned'){
// Continue to retreat phase
phase = 'retreat';
napoleon.retreating = true;
napoleon.speed = 28;
retreatTime = 0;
for(const s of napoleon.soldiers) s.facing = -1;
addMessage('Napoleon retreats! The winter will do the rest...', 4000);
return;
}
if(phase==='napoleon_wins' || phase==='gameover_win' || phase==='gameover_lose'){
if(my > H/2+60 && my < H/2+110){
resetGame();
}
return;
}
// Burn Moscow choice
if(phase==='playing' && napoleon.atMoscow){
// Buttons drawn in HUD
const btnY = H/2 + 36;
if(my > btnY && my < btnY+50){
if(mx > W/2-220 && mx < W/2-20){
// BURN IT
burnMoscow();
} else if(mx > W/2+20 && mx < W/2+220){
// SURRENDER
phase = 'napoleon_wins';
}
}
return;
}

// Deploy box buttons (desktop only — mobile uses HTML panel)
if(!isMobile && (phase==='playing' || phase==='retreat') && !russia.inBattle){
// Minus
if(mx >= BTN_MINUS.x && mx <= BTN_MINUS.x+BTN_MINUS.w && my >= BTN_MINUS.y && my <= BTN_MINUS.y+BTN_MINUS.h){
if(russia.pendingSoldiers > 0){ russia.pendingSoldiers--; russia.bank++; }
return;
}
// Plus
if(mx >= BTN_PLUS.x && mx <= BTN_PLUS.x+BTN_PLUS.w && my >= BTN_PLUS.y && my <= BTN_PLUS.y+BTN_PLUS.h){
if(russia.bank > 0){ russia.pendingSoldiers++; russia.bank--; }
return;
}
// Send into battle
if(mx >= BTN_SEND.x && mx <= BTN_SEND.x+BTN_SEND.w && my >= BTN_SEND.y && my <= BTN_SEND.y+BTN_SEND.h){
if(russia.pendingSoldiers > 0){
sendIntoBattle();
}
return;
}
}

// Click on deployed Russian soldier to switch control (only when inBattle)
if(russia.inBattle && (phase==='playing' || phase==='retreat')){
for(let i=0; i<russia.deployed.length; i++){
const s = russia.deployed[i];
if(!s.alive) continue;
const sx = s.x - camera.x;
if(Math.abs(mx-sx)<20 && Math.abs(my-s.y)<30){
if(russia.controlledIdx>=0 && russia.deployed[russia.controlledIdx])
russia.deployed[russia.controlledIdx].controlled = false;
s.controlled = true;
russia.controlledIdx = i;
break;
}
}
}
}

function burnMoscow(){
phase = 'burned';
moscow.burned = true;
// Big fire effects
for(let i=0; i<40; i++){
particles.push({
x: MOSCOW_X + Math.random()*300 - 50,
y: GROUND_Y - 40 - Math.random()*120,
vx: (Math.random()-0.5)*2,
vy: -1 - Math.random()*3,
life: 2000 + Math.random()*3000,
maxLife: 5000,
r: 4+Math.random()*8,
color: Math.random()>0.5 ? COL.fire : COL.fireGlow,
});
}
// Napoleon gets NO food from Moscow — immediately begin retreat
napoleon.retreating = true;
napoleon.speed = 28;
napoleon.stopped = false;
retreatTime = 0;
// Flip all French soldiers to face west (left)
for(const s of napoleon.soldiers){
  if(s.alive && !s.dying) s.facing = -1;
}
addMessage('Moscow burns! Napoleon has nothing. He must retreat into winter.', 5000);
}

function sendIntoBattle(){
if(russia.pendingSoldiers <= 0) return;
// Deselect previous controlled
if(russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx])
russia.deployed[russia.controlledIdx].controlled = false;
russia.controlledIdx = -1;

// Spawn soldiers on the right side of the screen (just inside view)
const spawnBaseX = camera.x + W - 80;
for(let i=0; i<russia.pendingSoldiers; i++){
const sy = LANE_TOP + 20 + Math.random() * (LANE_BOT - LANE_TOP - 40);
const sx = spawnBaseX - i * 18 + (Math.random()-0.5)*10;
const s = createRussianSoldier(Math.max(camera.x+20, sx), sy);
if(i === 0){
s.controlled = true;
russia.controlledIdx = russia.deployed.length;
}
russia.deployed.push(s);
russia.totalDeployed++;
}
const count = russia.pendingSoldiers;
russia.pendingSoldiers = 0;
russia.inBattle = true;
addMessage(`${count} soldier${count>1?'s':''} deployed! WASD to move, Space to attack.`, 2500);
addMessage('Camera follows you. Raid farms, attack soldiers!', 2000);
}

function updateBurned(dt){
retreatTime += dt;
// Temperature plummets as retreat begins
const retreatProgress = retreatTime / 120000;
temperature = 0 - retreatProgress * 35;
spawnAndUpdateSnow(dt);

// Napoleon himself walks west
napoleon.x -= napoleon.speed * (dt/1000);

// Russian forces keep fighting
updateRussianForces(dt);
updateCombat(dt);
updateDying(dt);

// Camera follows player or Napoleon
let focusX = napoleon.x - 350;
if(russia.inBattle && russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx]?.alive){
  focusX = russia.deployed[russia.controlledIdx].x - 500;
}
camera.x += (focusX - camera.x) * Math.min(1, dt/300);
camera.x = Math.max(0, Math.min(MAP_WIDTH - W, camera.x));

// Transition to full retreat once Napoleon moves a bit west
if(napoleon.x < MOSCOW_X - 200){
  phase = 'retreat';
}
}

function startGame(){
phase = 'playing';
buildMap();
initNapoleonArmy();
russia.bank = 50;
russia.deployed = [];
russia.controlledIdx = -1;
russia.totalDeployed = 0;
russia.pendingSoldiers = 0;
russia.inBattle = false;
russia.sharedFarmTarget = null;
russia.sharedBridgeTarget = null;
moscow.hp = moscow.maxHp;
moscow.burned = false;
temperature = 15;
gameTime = 0;
retreatTime = 0;
camera.x = 0;
effects = [];
particles = [];
messages = [];
ghosts = [];
snowflakes = [];
addMessage('June 1812: Napoleon crosses into Russia with 100,000 men.', 4000);
addMessage('Use + to add soldiers, then Send into Battle to deploy them.', 5000);
}

function resetGame(){
phase = 'title';
}

// -- MESSAGES --
function addMessage(text, duration){
messages.push({ text, life: duration, maxLife: duration });
}

// -- UPDATE --
function update(dt){
gameTime += dt;

// Update messages
for(let i=messages.length-1; i>=0; i--){
messages[i].life -= dt;
if(messages[i].life <= 0) messages.splice(i,1);
}

// Update particles
for(let i=particles.length-1; i>=0; i--){
const p=particles[i];
p.x += p.vx; p.y += p.vy;
p.life -= dt;
if(p.life<=0) particles.splice(i,1);
}

if(phase==='playing') updatePlaying(dt);
else if(phase==='retreat') updateRetreat(dt);
else if(phase==='burned') updateBurned(dt);

// Update ghosts (floating emoji particles)
for(let i=ghosts.length-1; i>=0; i--){
  const g = ghosts[i];
  g.y -= g.vy * (dt/1000);
  g.life -= dt;
  if(g.life <= 0) ghosts.splice(i,1);
}

syncMobilePanel();
}

function updatePlaying(dt){
// Temperature drops as Napoleon approaches Moscow
const progress = napoleon.x / MOSCOW_X;
// June (15°C) → September at Moscow (~5°C approach), sharper drop later
temperature = 15 - progress * 12;

updateNapoleonAdvance(dt);
updateRussianForces(dt);
updateCombat(dt);
updateFarmsAndBridges(dt);

// Camera: follow player only when inBattle and controlled alive
let focusX = napoleon.x - 350;
if(russia.inBattle && russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx]?.alive){
const cs = russia.deployed[russia.controlledIdx];
focusX = cs.x - 500;
}
camera.x += (focusX - camera.x) * Math.min(1, dt/300);
camera.x = Math.max(0, Math.min(MAP_WIDTH - W, camera.x));

// Check: Napoleon reaches Moscow
if(napoleon.x >= MOSCOW_X && !napoleon.atMoscow){
napoleon.atMoscow = true;
napoleon.stopped = true;
const alive = napoleon.soldiers.filter(s=>s.alive&&!s.dying).length;
addMessage(`Napoleon reaches Moscow with ${alive} soldiers!`, 5000);
}
}

function spawnAndUpdateSnow(dt){
const retreatProgress = Math.min(1, retreatTime / 120000);
// Spawn snowflakes — rate ramps up with retreat progress
const spawnRate = retreatProgress * 0.22 * dt;
for(let i=0; i < spawnRate + (Math.random() < (spawnRate % 1) ? 1 : 0); i++){
  snowflakes.push({
    x: Math.random() * W,
    y: -6,
    vx: (Math.random()-0.5) * 18,
    vy: 45 + Math.random() * 55,
    r: 1.2 + Math.random() * 2.2,
    wobble: Math.random() * Math.PI * 2,
  });
}
// Update flakes
for(let i=snowflakes.length-1; i>=0; i--){
  const fl = snowflakes[i];
  fl.wobble += dt * 0.003;
  fl.x += (fl.vx + Math.sin(fl.wobble) * 8) * (dt/1000);
  fl.y += fl.vy * (dt/1000);
  if(fl.y > H + 8 || fl.x < -10 || fl.x > W + 10) snowflakes.splice(i, 1);
}
}

function updateRetreat(dt){
retreatTime += dt;
// Temperature plummets during retreat: from ~0 down to -30
const retreatProgress = retreatTime / 120000; // ~2min full retreat
temperature = 0 - retreatProgress * 35;
spawnAndUpdateSnow(dt);

// Napoleon marches back (leftward)
if(!napoleon.stopped){
napoleon.x = Math.max(0, napoleon.x - napoleon.speed * (dt/1000));
// French soldiers follow
for(const s of napoleon.soldiers){
if(!s.alive || s.dying) continue;
const targetX = napoleon.x + (s.x - napoleon.x) * 0.3 + (Math.random()-0.5)*2;
s.x += (targetX - s.x) * 0.01 - napoleon.speed * (dt/1000) * 0.9;
s.walkTimer += dt;

  // Disease progression continues into retreat (faster in the cold)
  if(s.diseased && !s.dying){
    s.sickness = Math.min(1, s.sickness + dt * 0.00015);
    if(s.sickness >= 1){ s.dying = true; s.dyingMs = 2000; s.deathType = 'disease'; }
  }
  // Winter attrition
  if(temperature < -5){
    const freezeChance = Math.abs(temperature + 5) * 0.000008 * dt;
    if(Math.random() < freezeChance && !s.dying){
      s.dying = true; s.dyingMs = 1500; s.deathType = 'freeze'; s.frozen = 1;
    }
    const diseaseChance = Math.abs(temperature + 5) * 0.000005 * dt;
    if(Math.random() < diseaseChance && !s.dying){
      s.diseased = true; s.sickness = Math.max(s.sickness, 0.2);
    }
  }
  // New disease spread during retreat when food low
  const foodRatioR = napoleon.food / napoleon.maxFood;
  if(foodRatioR < 0.5 && !s.diseased && Math.random() < (0.5-foodRatioR)*0.000015*dt){
    s.diseased = true; s.sickness = 0.05;
  }
}

// Check rivers  - need bridges
for(const bridge of bridges){
  if(!bridge.intact && Math.abs(napoleon.x - bridge.x) < 60){
    napoleon.stopped = true;
    napoleon.buildingBridge = true;
    napoleon.bridgeBuildTime = 0;
    napoleon.bridgeBuildMax = 4000;
    addMessage('Napoleon must rebuild the bridge! Attack now!', 3000);
    break;
  }
}

} else if(napoleon.buildingBridge) {
napoleon.bridgeBuildTime += dt;
if(napoleon.bridgeBuildTime >= napoleon.bridgeBuildMax){
napoleon.buildingBridge = false;
napoleon.stopped = false;
// Find the bridge and "rebuild" it
for(const b of bridges){
if(!b.intact && Math.abs(napoleon.x - b.x)<100){
b.intact = true; b.hp = 50; break;
}
}
}
}

// Food consumption during retreat
napoleon.food -= dt * 0.015;

// Starvation kills
if(napoleon.food <= 0){
napoleon.food = 0;
const starveChance = 0.00003 * dt;
for(const s of napoleon.soldiers){
if(s.alive && !s.dying && Math.random() < starveChance){
s.dying = true; s.dyingMs = 1500; s.deathType = 'disease';
}
}
}

updateRussianForces(dt);
updateCombat(dt);
updateDying(dt);

// Camera
let focusX = napoleon.x - 350;
if(russia.inBattle && russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx]?.alive){
focusX = russia.deployed[russia.controlledIdx].x - 500;
}
camera.x += (focusX - camera.x) * Math.min(1, dt/300);
camera.x = Math.max(0, Math.min(MAP_WIDTH - W, camera.x));

// Win condition: Napoleon's army destroyed or he retreats past start
const aliveF = napoleon.soldiers.filter(s=>s.alive&&!s.dying).length;
if(aliveF <= 0){
phase = 'gameover_win';
addMessage('The Grande Armée is destroyed!', 5000);
}
if(napoleon.x < 100){
phase = 'gameover_win';
addMessage(`Napoleon escapes with ${aliveF} soldiers of 100,000.`, 5000);
}
}

function updateNapoleonAdvance(dt){
// Bridge building runs regardless of stopped state
if(napoleon.buildingBridge){
napoleon.bridgeBuildTime += dt;
// Workers animate hammering and move toward bridge
for(const s of napoleon.soldiers){
  if(!s.alive || s.dying || s.role !== 'worker') continue;
  const workerSlot = napoleon.workerIds.indexOf(s.id);
  const targetX = napoleon.buildBridgeX + (workerSlot - 1.5) * 14;
  const dx = targetX - s.x;
  if(Math.abs(dx) > 6){
    s.x += Math.sign(dx) * 40 * (dt/1000);
    s.facing = dx > 0 ? 1 : -1;
    s.walkTimer += dt;
  }
  if(Math.abs(dx) < 30){
    s.hammerAngle = Math.sin(gameTime * 0.008 + workerSlot) * 1.4;
  }
}
if(napoleon.bridgeBuildTime >= napoleon.bridgeBuildMax){
  napoleon.buildingBridge = false;
  napoleon.stopped = false;
  for(const b of bridges){
    if(!b.intact && Math.abs(napoleon.x - b.x) < 100){
      b.intact = true; b.hp = 100; break;
    }
  }
  for(const s of napoleon.soldiers){
    if(s.role === 'worker'){ s.role = 'column'; s.hammerAngle = 0; }
  }
  napoleon.workerIds = [];
  addMessage('Bridge rebuilt! The Grande Armée advances.', 2500);
}
return; // don't march while workers are building
}

if(napoleon.stopped || napoleon.atMoscow) return;

// Check for river/bridge — assign workers when first hit
for(const bridge of bridges){
if(Math.abs(napoleon.x - bridge.x) < 50){
if(!bridge.intact){
  napoleon.stopped = true;
  napoleon.buildingBridge = true;
  napoleon.bridgeBuildTime = 0;
  napoleon.bridgeBuildMax = 5000;
  napoleon.buildBridgeX = bridge.x;
  napoleon.workerIds = [];
  for(const s of napoleon.soldiers){
    if(s.alive && !s.dying && s.role === 'column' && napoleon.workerIds.length < 4){
      s.role = 'worker';
      napoleon.workerIds.push(s.id);
    }
  }
  addMessage('Napoleon must build a bridge! Attack the workers!', 3500);
  return;
}
}
}

// March forward
napoleon.x += napoleon.speed * (dt/1000);

// Update supply wagons — follow column at fixed offsets
for(let i = 0; i < napoleon.wagons.length; i++){
const wag = napoleon.wagons[i];
const targetX = napoleon.x - 140 - i * 90;
wag.x += (targetX - wag.x) * 0.03 + napoleon.speed * (dt/1000) * 0.82;
wag.wobble += dt * 0.003;
}

// Soldiers move according to role
for(const s of napoleon.soldiers){
if(!s.alive || s.dying) continue;
s.walkTimer += dt;
napoleon.food = Math.max(0, napoleon.food - dt * 0.000025);

// Disease progression for already-diseased soldiers (~11s visible green walk before death)
if(s.diseased && !s.dying){
  s.sickness = Math.min(1, s.sickness + dt * 0.00009);
  if(s.sickness >= 1){
    s.dying = true; s.dyingMs = 2000; s.deathType = 'disease';
  }
}

if(s.role === 'vanguard'){
  // Vanguard runs well ahead — but STOPS at broken bridges
  let blockX = Infinity;
  for(const b of bridges){
    if(!b.intact && b.x > napoleon.x && b.x < blockX) blockX = b.x;
  }
  const rawTargetX = napoleon.x + 60 + s.offsetY * 0.3;
  const targetX = Math.min(rawTargetX, blockX - 32);
  // Approach target gradually; slow to a stop at bridge edge without hard-snapping
  s.x += (targetX - s.x) * 0.012 + Math.min(napoleon.speed * (dt/1000) * 0.95, Math.max(0, blockX - 32 - s.x));
  s.facing = 1;
} else if(s.role === 'raider'){
  // Decay exclamation timer
  if(s.exclamTimer > 0) s.exclamTimer = Math.max(0, s.exclamTimer - dt);

  // Raiders race ahead to loot farms, then carry food back slowly (laden)
  let nearFarm = null, nearFarmDist = Infinity;
  for(const farm of farms){
    if(!farm.alive || farm.food <= 0 || farm.burning || farm.farmHp <= 0) continue;
    const d = Math.hypot(s.x - farm.x, s.y - farm.y);
    if(d < 700 && farm.x > napoleon.x - 100 && d < nearFarmDist){
      nearFarm = farm; nearFarmDist = d;
    }
  }
  if(nearFarm && !s.raidReturning){
    s.raidTarget = nearFarm;
    s.burntTarget = null;
    const dx = nearFarm.x - s.x;
    const dy = nearFarm.y - s.y;
    const dist = Math.hypot(dx, dy) || 1;
    if(dist > 22){
      s.x += (dx/dist) * s.speed * 1.55 * (dt/1000);
      s.y += (dy/dist) * s.speed * 1.55 * (dt/1000);
      s.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, s.y));
      s.facing = dx > 0 ? 1 : -1;
    } else {
      // At farm — forage, load cart
      const take = Math.min(dt * 0.015, nearFarm.food);
      nearFarm.food -= take;
      s.carryFood = Math.min(20, s.carryFood + take);
      if(nearFarm.food <= 0 || s.carryFood >= 18){
        nearFarm.alive = nearFarm.food > 0;
        s.raidReturning = true;
        s.raidTarget = null;
        s.carrying = s.carryFood > 0;
      }
    }
  } else if(!s.raidReturning && !s.burntTarget){
    // No live farm — look for a burnt farm to investigate (within 600px ahead)
    let nearBurnt = null, nearBurntDist = Infinity;
    for(const farm of farms){
      if(farm.alive) continue; // skip live farms
      const d = Math.hypot(s.x - farm.x, s.y - farm.y);
      if(d < 600 && farm.x > napoleon.x - 50 && d < nearBurntDist){
        nearBurnt = farm; nearBurntDist = d;
      }
    }
    if(nearBurnt){
      s.burntTarget = nearBurnt;
    } else {
      // Nothing to investigate — just follow army
      const targetX = napoleon.x - 40;
      const targetY = GROUND_Y + 35;
      s.x += (targetX - s.x) * 0.008 + napoleon.speed * (dt/1000) * 0.88;
      s.y += (targetY - s.y) * 0.025;
      s.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, s.y));
      s.facing = 1;
    }
  } else if(s.burntTarget && !s.raidReturning){
    // Move toward burnt farm
    const dx = s.burntTarget.x - s.x;
    const dy = s.burntTarget.y - s.y;
    const dist = Math.hypot(dx, dy) || 1;
    if(dist > 26){
      s.x += (dx/dist) * s.speed * 1.3 * (dt/1000);
      s.y += (dy/dist) * s.speed * 1.3 * (dt/1000);
      s.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, s.y));
      s.facing = dx > 0 ? 1 : -1;
    } else {
      // Arrived at burnt farm — show red ! and turn back
      s.exclamTimer = 1800;
      s.burntTarget = null;
      s.raidReturning = true;
    }
  } else {
    // Return to army with food — laden, so noticeably slower
    const targetX = napoleon.x - 60;
    const targetY = GROUND_Y + 35;
    s.x += (targetX - s.x) * 0.008 + napoleon.speed * (dt/1000) * 0.62;
    s.y += (targetY - s.y) * 0.025;
    s.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, s.y));
    s.facing = s.x > napoleon.x ? -1 : 1;
    if(Math.abs(s.x - napoleon.x) < 180){
      if(s.carrying){
        napoleon.food = Math.min(napoleon.maxFood, napoleon.food + s.carryFood);
        s.carryFood = 0;
        s.carrying = false;
      }
      s.raidReturning = false;
    }
  }
} else if(s.role === 'column'){
  // Main column — spread 50-550 behind Napoleon
  const colPos = (napoleon.soldiers.indexOf(s) % 78) / 78;
  const targetX = napoleon.x - 50 - colPos * 500 + s.offsetY * 0.2;
  s.x += (targetX - s.x) * 0.006 + napoleon.speed * (dt/1000) * 0.88;
  s.facing = 1;
  // Forage only from road-level farms (can't reach upper/lower fields)
  for(const farm of farms){
    if(farm.alive && Math.abs(s.x - farm.x) < 50 && Math.abs(s.y - farm.y) < 70 && farm.food > 0){
      const take = Math.min(dt * 0.004, farm.food);
      farm.food -= take;
      napoleon.food = Math.min(napoleon.maxFood, napoleon.food + take);
      if(farm.food <= 0) farm.alive = false;
    }
  }
}
}

// Disease spreads from 25% of the march onward — accelerates as food drops
// Historical: >50% of the Grande Armée died before reaching Moscow
const marchProgress = napoleon.x / MOSCOW_X;
const foodRatio = napoleon.food / napoleon.maxFood;
if(marchProgress > 0.25){
  // Base rate from march distance; starving amplifies heavily
  const distFactor = Math.min(1, (marchProgress - 0.25) / 0.75); // 0→1 over remaining march
  const starveFactor = Math.max(0, 1 - foodRatio * 2);            // 0 at 50%+ food, 1 at 0%
  const sickRate = distFactor * 0.35 + starveFactor * 0.65;
  const infChance = sickRate * 0.000055 * dt; // ~54 of 90 soldiers infected before Moscow
  for(const s of napoleon.soldiers){
    if(s.alive && !s.dying && !s.diseased && Math.random() < infChance){
      s.diseased = true;
      s.sickness = 0.05; // starts at very faint green
    }
  }
}

// Starvation
if(napoleon.food <= 0){
napoleon.food = 0;
for(const s of napoleon.soldiers){
  if(s.alive && !s.dying && Math.random() < 0.000015 * dt){
    s.dying = true; s.dyingMs = 1500; s.deathType = 'disease';
  }
}
}

updateDying(dt);
}

function updateDying(dt){
for(const s of napoleon.soldiers){
if(s.dying){
s.dyingMs -= dt;
if(s.dyingMs <= 0){
  if(s.deathType === 'freeze'){
    // Persist as blue frozen corpse on the ground
    s.frozenBody = true;
  } else if(s.deathType === 'disease'){
    // Spawn rising ghost
    ghosts.push({ x: s.x, y: s.y, vy: 55, life: 2200, maxLife: 2200 });
  }
  s.alive = false; s.dying = false;
}
}
if(s.flash > 0) s.flash -= dt;
if(s.knockTimer > 0){ s.x += s.knockVX*(dt/1000); s.knockTimer=Math.max(0,s.knockTimer-dt); if(s.knockTimer<=0)s.knockVX=0; }
}
for(const s of russia.deployed){
if(s.dying){
s.dyingMs -= dt;
if(s.dyingMs <= 0){ s.alive = false; s.dying = false; }
}
if(s.flash > 0) s.flash -= dt;
if(s.knockTimer > 0){ s.x += s.knockVX*(dt/1000); s.knockTimer=Math.max(0,s.knockTimer-dt); if(s.knockTimer<=0)s.knockVX=0; }
}
}

function updateRussianForces(dt){
// If inBattle and controlled soldier died, find next alive or end battle
if(russia.inBattle){
const cur = russia.controlledIdx >= 0 ? russia.deployed[russia.controlledIdx] : null;
if(!cur || (!cur.alive && !cur.dying)){
// Try to hand control to another alive deployed soldier
let newCtrl = -1;
for(let i=0; i<russia.deployed.length; i++){
if(russia.deployed[i].alive && !russia.deployed[i].dying){ newCtrl=i; break; }
}
if(newCtrl >= 0){
if(russia.controlledIdx >= 0 && russia.deployed[russia.controlledIdx])
russia.deployed[russia.controlledIdx].controlled = false;
russia.deployed[newCtrl].controlled = true;
russia.controlledIdx = newCtrl;
} else {
russia.inBattle = false;
russia.controlledIdx = -1;
addMessage('Your soldiers are gone. Reinforce from the reserve.', 3000);
}
}
}
const controlled = russia.controlledIdx >= 0 ? russia.deployed[russia.controlledIdx] : null;

// Player-controlled soldier
if(controlled && controlled.alive && !controlled.dying){
let dx=0, dy=0;
if(keys['ArrowLeft']||keys['KeyA']) dx=-1;
if(keys['ArrowRight']||keys['KeyD']) dx=1;
if(keys['ArrowUp']||keys['KeyW']) dy=-1;
if(keys['ArrowDown']||keys['KeyS']) dy=1;
if(Math.abs(touch.jx)>0.1) dx=touch.jx;
if(Math.abs(touch.jy)>0.1) dy=touch.jy;
const len=Math.hypot(dx,dy);
if(len>0){ dx/=len; dy/=len; }
controlled.x += dx * controlled.speed * (dt/1000);
controlled.y += dy * controlled.speed * 0.6 * (dt/1000);
controlled.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, controlled.y));
controlled.x = Math.max(20, Math.min(MAP_WIDTH-20, controlled.x));
if(dx!==0) controlled.facing = dx>0?1:-1;
controlled.walkTimer += dt * (Math.abs(dx)+Math.abs(dy) > 0 ? 1 : 0);

// Attack
controlled.atkCd = Math.max(0, controlled.atkCd - dt);
if(controlled.atkTimer > 0) controlled.atkTimer = Math.max(0, controlled.atkTimer - dt);
if((keys['Space']||keys['KeyZ']||touch.attack) && controlled.atkCd <= 0){
  controlled.atkCd = controlled.atkCdMax;
  controlled.atkTimer = 250;
  // Hit French soldiers — 3 hits to kill (34 dmg per hit on 100 HP)
  for(const f of napoleon.soldiers){
    if(!f.alive || f.dying) continue;
    const ddx = (f.x - controlled.x) * controlled.facing;
    const ddy = Math.abs(f.y - controlled.y);
    if(ddx > -10 && ddx < controlled.atkRange && ddy < 30){
      f.hp -= 34 + Math.floor(Math.random()*4);
      f.flash = 200;
      // Knockback: push enemy in the direction the player is facing
      f.knockVX = controlled.facing * 80;
      f.knockTimer = 180;
      if(f.hp <= 0 && !f.dying){
        f.dying = true; f.dyingMs = 800; f.deathType = 'combat';
      }
      break; // one hit per swing
    }
  }
  // Attack bridges — wide hitbox covering full lane width at bridge
  for(const b of bridges){
    if(b.intact && Math.abs(controlled.x - b.x) < 70 && Math.abs(controlled.y - (GROUND_Y + 80)) < 80){
      b.hp -= 15;
      russia.sharedBridgeTarget = b;
      addMessage(`Bridge damaged! (${Math.max(0,b.hp)}/${b.maxHp})`, 1000);
      if(b.hp <= 0){
        b.intact = false;
        if(russia.sharedBridgeTarget === b) russia.sharedBridgeTarget = null;
        addMessage('Bridge destroyed! Napoleon must rebuild!', 3000);
      }
      break;
    }
  }
  // Attack farms / houses — 3 hits to destroy
  for(const farm of farms){
    if(!farm.alive || farm.burning) continue;
    if(Math.abs(controlled.x - farm.x) < 55 && Math.abs(controlled.y - farm.y) < 58){
      farm.farmHp = Math.max(0, farm.farmHp - 1);
      if(farm.farmHp <= 0){
        farm.burning = true;
        farm.burnTimer = 2500;
        russia.sharedFarmTarget = farm;
        addMessage(farm.isHouse ? 'House burning!' : 'Farm burning! Scorched earth!', 2000);
      } else {
        const label = farm.type === 'windmill' ? 'Windmill' : farm.isHouse ? 'House' : farm.type === 'barn' ? 'Barn' : farm.type === 'cottage' ? 'Cottage' : 'Farm';
        addMessage(`${label} hit! ${farm.farmHp} hit${farm.farmHp>1?'s':''} to burn.`, 900);
      }
      break; // one farm per swing
    }
  }
  // Attack Moscow directly
  if(!moscow.burned && Math.abs(controlled.x - MOSCOW_X) < 130){
    moscow.hp = Math.max(0, moscow.hp - (18 + Math.floor(Math.random()*10)));
    if(moscow.hp <= 0 && !napoleon.atMoscow){
      napoleon.atMoscow = true;
      napoleon.stopped = true;
      addMessage('Moscow is crumbling! Confirm the burning of the city!', 4000);
    }
  }
}

}

// AI soldiers: follow player first; join combat only when player is fighting
let playerNearFrench = false;
if(controlled && controlled.alive && !controlled.dying){
  for(const f of napoleon.soldiers){
    if(!f.alive||f.dying) continue;
    if(Math.hypot(f.x-controlled.x, f.y-controlled.y) < 180){ playerNearFrench = true; break; }
  }
}

for(let i=0; i<russia.deployed.length; i++){
const s = russia.deployed[i];
if(!s.alive || s.dying || s.controlled) continue;
s.atkCd = Math.max(0, s.atkCd - dt);
if(s.atkTimer > 0) s.atkTimer = Math.max(0, s.atkTimer - dt);

// Find nearest French
let nearF = null, nearD = Infinity;
for(const f of napoleon.soldiers){
  if(!f.alive||f.dying) continue;
  const d = Math.hypot(f.x-s.x, f.y-s.y);
  if(d < nearD){ nearF=f; nearD=d; }
}

// Engage French only if: player is fighting (join the fight) OR enemy is right on top of us
const engageRange = playerNearFrench ? 180 : 50; // self-defence only when player is focused elsewhere
if(nearF && nearD < engageRange){
  // Attack
  const ddx = nearF.x - s.x, ddy = nearF.y - s.y;
  const dlen = Math.hypot(ddx,ddy)||1;
  s.facing = ddx > 0 ? 1 : -1;
  if(nearD > s.atkRange){
    s.x += (ddx/dlen) * s.speed * (dt/1000);
    s.y += (ddy/dlen) * s.speed * 0.4 * (dt/1000);
  } else if(s.atkCd <= 0){
    s.atkCd = s.atkCdMax; s.atkTimer = 250;
    nearF.hp -= 34 + Math.floor(Math.random()*4);
    nearF.flash = 200;
    nearF.knockVX = (s.facing) * 70;
    nearF.knockTimer = 160;
    if(nearF.hp <= 0 && !nearF.dying){
      nearF.dying = true; nearF.dyingMs = 800; nearF.deathType = 'combat';
    }
  }
} else if(controlled && controlled.alive && !controlled.dying){
  // Follow controlled soldier — shared bridge target takes top priority, then farm
  if(russia.sharedBridgeTarget && russia.sharedBridgeTarget.intact){
    const bt = russia.sharedBridgeTarget;
    const bdx = bt.x - s.x;
    const bridgeDeckY = GROUND_Y + 80;
    const bdy = bridgeDeckY - s.y;
    const bd = Math.hypot(bdx, bdy) || 1;
    if(Math.abs(bdx) > 65 || Math.abs(s.y - bridgeDeckY) > 75){
      s.x += (bdx/bd) * s.speed * 1.1 * (dt/1000);
      s.y += (bdy/bd) * s.speed * 0.55 * (dt/1000);
      s.facing = bdx > 0 ? 1 : -1;
    } else if(s.atkCd <= 0){
      s.atkCd = s.atkCdMax;
      s.atkTimer = 250;
      bt.hp -= 10;
      if(bt.hp <= 0){
        bt.intact = false;
        if(russia.sharedBridgeTarget === bt) russia.sharedBridgeTarget = null;
      }
    }
  } else if(russia.sharedFarmTarget && russia.sharedFarmTarget.alive && !russia.sharedFarmTarget.burning){
    const ft = russia.sharedFarmTarget;
    const fdx = ft.x - s.x, fdy = ft.y - s.y;
    const fd = Math.hypot(fdx, fdy) || 1;
    if(fd > 40){
      s.x += (fdx/fd) * s.speed * 1.1 * (dt/1000);
      s.y += (fdy/fd) * s.speed * 0.55 * (dt/1000);
      s.facing = fdx > 0 ? 1 : -1;
    }
  } else {
    const ddx = controlled.x - s.x, ddy = controlled.y - s.y;
    const d = Math.hypot(ddx,ddy)||1;
    if(d > 50){
      s.x += (ddx/d) * s.speed * 1.0 * (dt/1000);
      s.y += (ddy/d) * s.speed * 0.5 * (dt/1000);
      s.facing = ddx > 0 ? 1 : -1;
    }
  }
}
s.y = Math.max(LANE_TOP+5, Math.min(LANE_BOT-5, s.y));
s.walkTimer += dt;

}

updateDying(dt);
}

function updateCombat(dt){
// French soldiers fight back against nearby Russians
for(const f of napoleon.soldiers){
if(!f.alive||f.dying) continue;
f.walkTimer += dt;

let nearR = null, nearD = Infinity;
for(const r of russia.deployed){
  if(!r.alive||r.dying) continue;
  const d = Math.hypot(r.x-f.x, r.y-f.y);
  if(d < nearD){ nearR=r; nearD=d; }
}

if(napoleon.retreating){
  // During retreat: walk west unless a Russian engages within 100px
  if(nearR && nearD < 100){
    // Turn to fight
    f.facing = nearR.x > f.x ? 1 : -1;
    if(nearD < 35){
      if(Math.random() < 0.0018 * dt){
        nearR.hp -= 34 + Math.floor(Math.random()*4);
        nearR.flash = 200;
        nearR.knockVX = (nearR.x > f.x ? 1 : -1) * 80;
        nearR.knockTimer = 180;
        if(nearR.hp <= 0 && !nearR.dying){ nearR.dying = true; nearR.dyingMs = 800; }
      }
    }
  } else {
    // March west
    f.facing = -1;
    f.x -= napoleon.speed * 0.75 * (dt/1000);
    // Cluster loosely around Napoleon
    const targetX = napoleon.x + (f.offsetY !== undefined ? f.offsetY * 0.15 : 0) + (Math.random()-0.5)*40;
    f.x += (targetX - f.x) * 0.003;
  }
} else {
  if(nearR && nearD < 35){
    // French attacks Russian — 3 hits to kill
    if(Math.random() < 0.0018 * dt){
      nearR.hp -= 34 + Math.floor(Math.random()*4);
      nearR.flash = 200;
      nearR.knockVX = (nearR.x > f.x ? 1 : -1) * 80;
      nearR.knockTimer = 180;
      if(nearR.hp <= 0 && !nearR.dying){ nearR.dying = true; nearR.dyingMs = 800; }
    }
  }
}

}
}

function updateFarmsAndBridges(dt){
for(const farm of farms){
if(farm.burning){
farm.burnTimer -= dt;
farm.food = Math.max(0, farm.food - dt * 0.02);
if(farm.burnTimer <= 0 || farm.food <= 0){
farm.alive = false;
farm.burning = false;
if(russia.sharedFarmTarget === farm) russia.sharedFarmTarget = null;
}
// Fire particles
if(Math.random() < 0.3){
particles.push({
x: farm.x + (Math.random()-0.5)*30,
y: GROUND_Y - 10 - Math.random()*40,
vx: (Math.random()-0.5)*1,
vy: -1-Math.random()*2,
life: 800+Math.random()*600,
maxLife: 1400,
r: 3+Math.random()*5,
color: Math.random()>0.4 ? COL.fire : COL.fireGlow,
});
}
}
}
}

// -- DRAWING --

// Parallax landscape background
// progress 0-1 = Niemen to Moscow
// Layer speeds: far=8%, mid=20% of camera scroll
function drawParallax(){
const progress = Math.max(0, Math.min(1, napoleon.x / MAP_WIDTH));
const camFar  = camera.x * 0.08;
const camMid  = camera.x * 0.20;
const camNear = camera.x * 0.38; // third, closest layer
const winterFactor = Math.max(0, Math.min(1, (5 - temperature) / 30));

// -- FAR LAYER: distant hills / horizon --
// Hill silhouettes that slowly change colour with season
const hillBase = GROUND_Y - 20;
// Hill colour: green -> forest grey-blue -> burned dark ochre -> ember-lit dark for Moscow
let hillBase1;
if(progress < 0.72){
  hillBase1 = lerpColor('#6a8a5a', '#4a6a8a', Math.min(1, progress * 3));
} else if(progress < 0.92){
  // Steppe: dark scorched earth, warm brown-black
  hillBase1 = lerpColor('#4a6a8a', '#3a2210', (progress - 0.72) / 0.20);
} else {
  // Moscow outskirts: ember-lit dark brown with red hint
  hillBase1 = lerpColor('#3a2210', '#3a1a08', (progress - 0.92) / 0.08);
}
const hillCol = lerpColor(hillBase1, '#9a9aaa', winterFactor * 0.4);

ctx.fillStyle = hillCol;
// Generate repeating hills using sine waves, offset by parallax
ctx.beginPath();
ctx.moveTo(0, hillBase);
for(let x = 0; x <= W; x += 4){
  const wx = x + camFar;
  const h = Math.sin(wx * 0.0015) * 30 +
            Math.sin(wx * 0.0031 + 1) * 18 +
            Math.sin(wx * 0.0007 + 2) * 50;
  ctx.lineTo(x, hillBase - 28 - h);
}
ctx.lineTo(W, GROUND_Y);
ctx.lineTo(0, GROUND_Y);
ctx.closePath();
ctx.fill();

// -- FAR LAYER landmarks: spires, windmills, fortress silhouettes --
const silCol = lerpColor(
  progress < 0.72 ? lerpColor('#455845','#3a5060',Math.min(1,progress*3)) : '#1e1008',
  '#6a6a7a', winterFactor * 0.5
);

if(progress < 0.72){
  // Distant village church spires — one per ~2000 world units
  for(let i=0; i<5; i++){
    const seedX = (i*3700+1300) % 10000;
    const lsx = ((seedX - camFar % 10000) + 10000) % 10000;
    if(lsx > W+40) continue;
    const spireBase = hillBase - 18 - Math.abs(Math.sin(seedX*0.002))*20;
    ctx.fillStyle = silCol;
    ctx.fillRect(lsx-4, spireBase, 8, hillBase-spireBase);
    ctx.beginPath(); ctx.moveTo(lsx-9,spireBase+2); ctx.lineTo(lsx,spireBase-18); ctx.lineTo(lsx+9,spireBase+2); ctx.fill();
    // Tiny onion dome silhouette
    ctx.beginPath(); ctx.arc(lsx, spireBase-14, 6, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.moveTo(lsx-3,spireBase-18); ctx.quadraticCurveTo(lsx,spireBase-26,lsx+3,spireBase-18); ctx.fill();
    ctx.fillRect(lsx-1, spireBase-28, 2, 6); // cross
  }
  // Distant windmill every ~3500 units
  for(let i=0; i<3; i++){
    const seedX = (i*4200+800) % 10000;
    const lsx = ((seedX - camFar % 10000) + 10000) % 10000;
    if(lsx > W+30) continue;
    const wmBase = hillBase - 12 - Math.abs(Math.sin(seedX*0.003))*15;
    ctx.fillStyle = silCol;
    ctx.beginPath(); ctx.ellipse(lsx, wmBase-10, 6, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(lsx-8,wmBase+2); ctx.lineTo(lsx,wmBase-24); ctx.lineTo(lsx+8,wmBase+2); ctx.fill();
    // Sail cross
    ctx.strokeStyle = silCol; ctx.lineWidth=1.5;
    const sa = gameTime*0.0007 + i;
    for(let ar=0;ar<4;ar++){
      const aa=sa+ar*Math.PI/2;
      ctx.beginPath(); ctx.moveTo(lsx,wmBase-10); ctx.lineTo(lsx+Math.cos(aa)*13,wmBase-10+Math.sin(aa)*13); ctx.stroke();
    }
  }
} else if(progress < 0.90){
  // Distant fortress/hilltop ruins silhouette
  for(let i=0; i<3; i++){
    const seedX = (i*5300+2100) % 10000;
    const lsx = ((seedX - camFar % 10000) + 10000) % 10000;
    if(lsx > W+60) continue;
    const fBase = hillBase - 25 - Math.abs(Math.sin(seedX*0.0015))*25;
    ctx.fillStyle = lerpColor('#241408','#1e1008',winterFactor);
    ctx.fillRect(lsx-30, fBase, 60, hillBase-fBase);
    // Broken battlements
    for(let b=0;b<5;b++) ctx.fillRect(lsx-28+b*13, fBase-(b%2)*8-4, 9, (b%2)*8+4);
    // Tower stump
    ctx.fillRect(lsx-8, fBase-18, 16, 18);
  }
  // Distant rising smoke columns from the steppe
  for(let i=0;i<4;i++){
    const seedX = (i*2900+700)%10000;
    const lsx = ((seedX - camFar % 10000)+10000)%10000;
    if(lsx>W+20) continue;
    ctx.strokeStyle=`rgba(30,20,10,${0.25+Math.sin(gameTime*0.0008+i)*0.08})`;
    ctx.lineWidth=3+i%2;
    ctx.beginPath();
    for(let y=hillBase;y>hillBase-70;y-=5){
      const wx2=lsx+Math.sin(gameTime*0.001+y*0.06+i*1.8)*5;
      if(y===hillBase) ctx.moveTo(wx2,y); else ctx.lineTo(wx2,y);
    }
    ctx.stroke();
  }
}

// -- MID LAYER: trees / landscape features --
// Type transitions based on progress:
// 0-0.15 open farmland (Lithuania border), 0.15-0.45 birch forest,
// 0.45-0.70 dark pine/fir, 0.70-0.90 open steppe, 0.90-1.0 outskirts

const treeY = GROUND_Y - 2;

if(progress < 0.18){
  // Open rolling fields — scattered lone trees + haystacks
  drawScatteredTrees(camMid, treeY, winterFactor, 'oak', progress);
} else if(progress < 0.50){
  // Classic Russian birch forest — white trunks, light canopy
  drawBirchForest(camMid, treeY, winterFactor, progress);
} else if(progress < 0.72){
  // Dense dark pine / fir forest (Smolensk region)
  drawPineForest(camMid, treeY, winterFactor, progress);
} else if(progress < 0.92){
  // Open steppe / burned landscape approaching Moscow
  drawSteppe(camMid, treeY, winterFactor, progress);
} else {
  // Moscow outskirts — church/monastery silhouettes on horizon
  drawMoscowOutskirts(camMid, treeY, winterFactor);
}

// -- NEAR LAYER (38% parallax): close-ground foreground features --
drawNearLayer(camNear, treeY, winterFactor, progress);
}

  ctx.fillRect(vsx+58, treeY-80, 2, 7);

  // Onion dome — tilted/damaged
  ctx.save(); ctx.translate(sx,treeY-bh-26); ctx.rotate((i-1)*0.12);
  ctx.fillStyle=lerpColor('#2a1a08','#1a1830',winterFactor);
  ctx.beginPath(); ctx.arc(0,0,12,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-6,-6); ctx.quadraticCurveTo(0,-18,6,-6); ctx.fill();
  ctx.restore();

  // Glowing fire inside/behind dome
  ctx.fillStyle=`rgba(255,80,10,${0.22+Math.sin(t*0.004+i*1.7)*0.1})`;
  ctx.beginPath(); ctx.arc(sx,treeY-bh-10,16,Math.PI,0); ctx.fill();

  // Heavy smoke
  ctx.strokeStyle=`rgba(40,30,20,0.55)`; ctx.lineWidth=7+i*2;
  ctx.beginPath();
  for(let y=treeY-bh-20; y>treeY-bh-110; y-=5){
    const wx=sx+Math.sin(t*0.0012+y*0.07+i*2)*8;
    if(y===treeY-bh-20) ctx.moveTo(wx,y); else ctx.lineTo(wx,y);
  }
  ctx.stroke();
}

// Scattered debris on ground: abandoned broken wagons
for(let i=0;i<3;i++){
  const sx = ((i*2300+650 - camOffset % 4500) + 4500) % 4500 - 50;
  if(sx < -50 || sx > W+60) continue;
  ctx.fillStyle='#2a1808';
  ctx.save(); ctx.translate(sx,treeY-4); ctx.rotate((i-1)*0.25);
  ctx.fillRect(-18,-5,36,7); // broken cart bed
  ctx.restore();
  ctx.strokeStyle='#2a1808'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(sx-10,treeY+3,7,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx+10,treeY+3,7,0,Math.PI*2); ctx.stroke();
}

// Dead trees silhouetted against the glow
for(let i=0;i<7;i++){
  const seedX=(i*1873+319)%3800;
  const sx=((seedX-camOffset%3800)+3800)%3800-40;
  if(sx<-40||sx>W+40) continue;
  const h=28+(i*11)%24;
  ctx.fillStyle='#100a04';
  ctx.fillRect(sx-2,treeY-h,4,h);
  ctx.strokeStyle='#100a04'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(sx,treeY-h); ctx.lineTo(sx-12+i%5*3,treeY-h+10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx,treeY-h*0.65); ctx.lineTo(sx+10+i%4*2,treeY-h*0.5); ctx.stroke();
}
}

function drawNearLayer(camOffset, treeY, winterFactor, progress){
// Close-foreground features: grass clumps, rocks, debris
// These scroll fastest, giving strong parallax depth
const t = gameTime;
const period = 2800;

if(progress < 0.72){
  // Grass tufts and small rocks
  const grassCol = lerpColor(
    progress < 0.5 ? '#7a9a50' : '#4a6a30',
    '#b0b0a0', winterFactor
  );
  for(let i=0;i<20;i++){
    const seedX = (i*1123+47) % period;
    const sx = ((seedX - camOffset % period) + period) % period - 20;
    if(sx < -20 || sx > W+20) continue;
    const h = 6 + (i*7)%8;
    ctx.fillStyle = grassCol;
    // Grass blades
    for(let g=0;g<4;g++){
      const gx = sx - 5 + g*3;
      const lean = Math.sin(t*0.001 + i*0.7 + g*0.4) * 2;
      ctx.beginPath();
      ctx.moveTo(gx, treeY);
      ctx.quadraticCurveTo(gx+lean, treeY-h*0.6, gx+lean*1.5, treeY-h);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = grassCol;
      ctx.stroke();
    }
    // Occasional small rock
    if(i%5===0){
      ctx.fillStyle = lerpColor('#888060','#aaaaaa',winterFactor);
      ctx.beginPath(); ctx.ellipse(sx+12, treeY-2, 5+i%4, 3, 0, 0, Math.PI*2); ctx.fill();
    }
  }
} else if(progress < 0.92){
  // Near burned debris: charred stumps, scattered ash
  for(let i=0;i<12;i++){
    const seedX = (i*1517+203) % period;
    const sx = ((seedX - camOffset % period) + period) % period - 20;
    if(sx < -20 || sx > W+20) continue;
    // Short charred stump
    ctx.fillStyle = '#1a1008';
    ctx.fillRect(sx-3, treeY-8, 6, 8);
    ctx.fillStyle = `rgba(255,80,10,${0.12+Math.sin(t*0.004+i*1.3)*0.06})`;
    ctx.fillRect(sx-4, treeY-3, 8, 3);
    // Ash scatter
    ctx.fillStyle = 'rgba(80,70,60,0.3)';
    for(let a=0;a<3;a++) ctx.fillRect(sx-8+a*6, treeY-1, 4, 2);
  }
} else {
  // Moscow outskirts near layer: fallen wall stones, ember glow
  for(let i=0;i<8;i++){
    const seedX = (i*1931+337) % period;
    const sx = ((seedX - camOffset % period) + period) % period - 30;
    if(sx < -30 || sx > W+30) continue;
    // Rubble/stones
    ctx.fillStyle = lerpColor('#2a1a08','#3a2818',winterFactor);
    ctx.fillRect(sx-8, treeY-5, 16, 5);
    ctx.fillRect(sx-4, treeY-9, 8, 4);
    // Ember glow on rubble
    ctx.fillStyle = `rgba(255,100,10,${0.2+Math.sin(t*0.006+i*1.7)*0.1})`;
    ctx.fillRect(sx-6, treeY-3, 12, 3);
  }
  // Scattered broken wagons close-up
  for(let i=0;i<4;i++){
    const seedX = (i*2777+509) % period;
    const sx = ((seedX - camOffset % period) + period) % period - 40;
    if(sx < -40 || sx > W+40) continue;
    ctx.fillStyle = '#1a1008';
    ctx.save(); ctx.translate(sx, treeY-2); ctx.rotate((i-1)*0.3);
    ctx.fillRect(-14,-3,28,5);
    ctx.restore();
    ctx.strokeStyle='#2a1a08'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(sx-8,treeY+2,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(sx+8,treeY+2,5,0,Math.PI*2); ctx.stroke();
  }
}
}

function drawSky(){
const winterFactor = Math.max(0, Math.min(1, (5 - temperature) / 30));
const g = ctx.createLinearGradient(0,0,0,GROUND_Y);
if(winterFactor < 0.3){
g.addColorStop(0,'#7a8a9a');
g.addColorStop(1,'#b0b8c0');
} else {
g.addColorStop(0, lerpColor('#7a8a9a','#4a5060',winterFactor));
g.addColorStop(1, lerpColor('#b0b8c0','#8a8a95',winterFactor));
}
ctx.fillStyle=g;
ctx.fillRect(0,0,W,GROUND_Y);

// Snow effect
if(temperature < 0){
const intensity = Math.min(1, Math.abs(temperature)/20);
ctx.fillStyle = `rgba(255,255,255,${intensity*0.6})`;
for(let i=0; i<Math.floor(intensity*80); i++){
const sx = (gameTime*0.02*(i%3+1) + i*73.7) % W;
const sy = (gameTime*0.03*(i%2+1) + i*31.3) % GROUND_Y;
ctx.fillRect(sx, sy, 2, 2);
}
}
}

function drawGround(){
const winterFactor = Math.max(0, Math.min(1, (2 - temperature) / 25));
const groundCol = lerpColor(COL.ground, COL.groundWinter, winterFactor);
ctx.fillStyle = groundCol;
ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

// Road
const roadCol = lerpColor(COL.road, COL.roadSnow, winterFactor);
ctx.fillStyle = roadCol;
ctx.fillRect(0, GROUND_Y + 30, W, 50);

// Road details
ctx.strokeStyle = lerpColor('#5a5040','#808088', winterFactor);
ctx.lineWidth = 0.5;
ctx.setLineDash([8,12]);
ctx.beginPath();
ctx.moveTo(0, GROUND_Y+55);
ctx.lineTo(W, GROUND_Y+55);
ctx.stroke();
ctx.setLineDash([]);

// Progressive snow accumulation on ground during retreat
const retreatProgress = (phase === 'retreat' || phase === 'burned') ? Math.min(1, retreatTime / 120000) : 0;
if(retreatProgress > 0){
  // Base snow blanket, builds up over time
  const snowDepth = retreatProgress;
  ctx.fillStyle = `rgba(218,228,240,${snowDepth * 0.72})`;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // Lighter snow on the road surface (packed, slightly less coverage)
  ctx.fillStyle = `rgba(225,233,245,${snowDepth * 0.45})`;
  ctx.fillRect(0, GROUND_Y + 30, W, 50);
  // Lumpy snow drifts along the ground edge
  if(snowDepth > 0.1){
    ctx.fillStyle = `rgba(232,240,250,${(snowDepth - 0.1) * 0.9})`;
    for(let lx = -30; lx < W + 40; lx += 48){
      const lumpH = 4 + Math.sin(lx * 0.08) * 3 + snowDepth * 8;
      ctx.beginPath();
      ctx.ellipse(lx, GROUND_Y + 2, 26, lumpH, 0, 0, Math.PI*2);
      ctx.fill();
    }
    // Snow on road edges
    ctx.fillStyle = `rgba(235,242,252,${(snowDepth - 0.1) * 0.7})`;
    for(let lx = -20; lx < W + 30; lx += 38){
      const lh = 3 + Math.cos(lx * 0.11) * 2 + snowDepth * 5;
      ctx.beginPath();
      ctx.ellipse(lx, GROUND_Y + 30, 20, lh, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(lx + 18, GROUND_Y + 80, 18, lh * 0.8, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
}
}

function drawRivers(){
for(const river of rivers){
const sx = river.x - camera.x;
if(sx < -100 || sx > W+100) continue;

const winterFactor = Math.max(0, Math.min(1, (-temperature)/15));

// River water — from ground line downward
ctx.fillStyle = lerpColor(COL.water, '#8a8a9a', winterFactor);
ctx.fillRect(sx - river.width/2, GROUND_Y - 4, river.width, H-GROUND_Y+8);

// Ice sheen
if(winterFactor > 0.3){
  ctx.fillStyle = `rgba(180,200,220,${winterFactor*0.4})`;
  ctx.fillRect(sx - river.width/2, GROUND_Y - 4, river.width, H-GROUND_Y+8);
}

// Ripples
if(winterFactor < 0.7){
  ctx.strokeStyle = `rgba(90,138,186,${0.3*(1-winterFactor)})`;
  ctx.lineWidth = 1;
  for(let r=0; r<3; r++){
    const ry = GROUND_Y + 20 + r*30;
    const rOff = Math.sin(gameTime*0.001 + r*2) * 5;
    ctx.beginPath();
    ctx.moveTo(sx - river.width/2+5, ry+rOff);
    ctx.quadraticCurveTo(sx, ry-5+rOff, sx+river.width/2-5, ry+rOff);
    ctx.stroke();
  }
}

}
}

function drawBridges(){
for(const bridge of bridges){
const sx = bridge.x - camera.x;
if(sx < -100 || sx > W+100) continue;
const bw = bridge.width + 14; // total span
const bLeft = sx - bw/2;
const bRight = sx + bw/2;
// Road deck sits at bottom of the travel lane; truss rises above it
const deckY = GROUND_Y + 80;
const trussTopY = GROUND_Y + 52;
const deckH = 16;

if(!bridge.intact){
  // Broken stump remnants on each bank
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(bLeft-2, deckY, 14, deckH);
  ctx.fillRect(bRight-12, deckY, 14, deckH);
  // Truss post stubs
  ctx.strokeStyle = '#3a2010'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(bLeft+5, deckY); ctx.lineTo(bLeft+5, deckY-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bRight-5, deckY); ctx.lineTo(bRight-5, deckY-22); ctx.stroke();
  // Planks floating in river
  ctx.fillStyle = '#5a4030';
  ctx.save(); ctx.translate(sx-8, deckY+18); ctx.rotate(0.28);
  ctx.fillRect(-14,-2.5,28,5); ctx.restore();
  ctx.save(); ctx.translate(sx+12, deckY+28); ctx.rotate(-0.2);
  ctx.fillRect(-10,-2,20,4); ctx.restore();
  continue;
}

// === INTACT WARREN TRUSS BRIDGE ===
// Road deck
ctx.fillStyle = '#7a5a30';
ctx.fillRect(bLeft, deckY, bw, deckH);
// Deck planks (transverse lines)
ctx.strokeStyle = '#4a3010'; ctx.lineWidth=0.9;
for(let p=0; p<bw; p+=9){
  ctx.beginPath();
  ctx.moveTo(bLeft+p, deckY);
  ctx.lineTo(bLeft+p, deckY+deckH);
  ctx.stroke();
}
// Road surface highlight
ctx.fillStyle = 'rgba(140,100,50,0.35)';
ctx.fillRect(bLeft+2, deckY, bw-4, 4);

// Truss side rails (top and bottom chord)
const segments = Math.floor(bw / 14);
ctx.strokeStyle = '#3a2808'; ctx.lineWidth=3;
// Bottom chord (deck top edge)
ctx.beginPath(); ctx.moveTo(bLeft, deckY); ctx.lineTo(bRight, deckY); ctx.stroke();
// Top chord
ctx.beginPath(); ctx.moveTo(bLeft, trussTopY); ctx.lineTo(bRight, trussTopY); ctx.stroke();

// End posts (tall vertical at each end)
ctx.lineWidth = 4;
ctx.beginPath(); ctx.moveTo(bLeft, trussTopY); ctx.lineTo(bLeft, deckY+deckH); ctx.stroke();
ctx.beginPath(); ctx.moveTo(bRight, trussTopY); ctx.lineTo(bRight, deckY+deckH); ctx.stroke();

// Warren truss: alternating diagonals + verticals
ctx.lineWidth = 2;
for(let i=0; i<segments; i++){
  const x1 = bLeft + i * bw/segments;
  const x2 = bLeft + (i+1) * bw/segments;
  // Vertical at x1
  ctx.beginPath(); ctx.moveTo(x1, trussTopY); ctx.lineTo(x1, deckY); ctx.stroke();
  // Diagonal: alternate direction (Warren pattern)
  ctx.lineWidth = 1.5;
  if(i % 2 === 0){
    ctx.beginPath(); ctx.moveTo(x1, trussTopY); ctx.lineTo(x2, deckY); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(x1, deckY); ctx.lineTo(x2, trussTopY); ctx.stroke();
  }
  ctx.lineWidth = 2;
}
// Last vertical
ctx.beginPath(); ctx.moveTo(bRight, trussTopY); ctx.lineTo(bRight, deckY); ctx.stroke();

// Rivet dots at joints
ctx.fillStyle = '#2a1808';
for(let i=0; i<=segments; i++){
  const px = bLeft + i * bw/segments;
  ctx.beginPath(); ctx.arc(px, deckY, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px, trussTopY, 2.5, 0, Math.PI*2); ctx.fill();
}

// HP bar if damaged
if(bridge.hp < bridge.maxHp){
  const pct = bridge.hp/bridge.maxHp;
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(sx-28, trussTopY-12, 56, 7);
  ctx.fillStyle = pct>0.5?'#4a8a2a':'#c84020';
  ctx.fillRect(sx-28, trussTopY-12, 56*pct, 7);
}

}
}

function drawFarms(){
for(const farm of farms){
const sx = farm.x - camera.x;
const fy = farm.y || GROUND_Y + 16; // y anchor (base of building)
if(sx < -90 || sx > W+90) continue;

// Charred remains
if(!farm.alive && !farm.burning){
  ctx.fillStyle='#1a1414';
  ctx.fillRect(sx-14, fy-4, 28, 8);
  // Ash scatter
  ctx.fillStyle='rgba(60,50,40,0.4)';
  for(let a=0;a<5;a++) ctx.fillRect(sx-20+a*9, fy, 6, 3);
  continue;
}

// Tilt from damage
const dmgTilt = farm.farmHp < 3 ? (3 - farm.farmHp) * 0.06 : 0;
ctx.save();
ctx.translate(sx, fy);
if(dmgTilt > 0) ctx.rotate(dmgTilt);

if(farm.isHouse){
  // Moscow suburb house — larger with chimney and windows
  ctx.fillStyle = farm.farmHp === 1 ? '#7a6040' : '#c8a870';
  ctx.fillRect(-18,-34,36,34);
  ctx.fillStyle = farm.farmHp === 1 ? '#4a1808' : '#7a3018';
  ctx.beginPath(); ctx.moveTo(-22,-34); ctx.lineTo(0,-56); ctx.lineTo(22,-34); ctx.fill();
  ctx.fillStyle='#6a4030'; ctx.fillRect(9,-64,6,16); // chimney
  ctx.fillStyle='rgba(220,190,110,0.65)';
  ctx.fillRect(-12,-28,9,10); ctx.fillRect(3,-28,9,10); // windows
  ctx.fillStyle='#2a1808'; ctx.fillRect(-4,-16,8,16); // door
  if(farm.farmHp === 2){ // crack overlay
    ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-6,-30); ctx.lineTo(-2,-18); ctx.lineTo(-8,-8); ctx.stroke();
  }
} else {
  switch(farm.type){
  case 'barn':
    // Wide red barn
    ctx.fillStyle = farm.farmHp === 1 ? '#5a1808' : '#9a2010';
    ctx.fillRect(-22,-28,44,28);
    // Gambrel roof (2-slope)
    ctx.fillStyle = farm.farmHp === 1 ? '#3a1006' : '#5a1808';
    ctx.beginPath(); ctx.moveTo(-24,-28); ctx.lineTo(-10,-40); ctx.lineTo(10,-40); ctx.lineTo(24,-28); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-10,-40); ctx.lineTo(0,-50); ctx.lineTo(10,-40); ctx.fill();
    // Barn doors (X pattern)
    ctx.strokeStyle='#2a0a04'; ctx.lineWidth=1.5;
    ctx.strokeRect(-18,-26,16,26);
    ctx.beginPath(); ctx.moveTo(-18,-26); ctx.lineTo(-2,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-2,-26); ctx.lineTo(-18,0); ctx.stroke();
    ctx.strokeRect(2,-26,16,26);
    ctx.beginPath(); ctx.moveTo(2,-26); ctx.lineTo(18,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(18,-26); ctx.lineTo(2,0); ctx.stroke();
    if(farm.farmHp===2){ // damage crack
      ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(4,-28); ctx.lineTo(0,-14); ctx.lineTo(6,-4); ctx.stroke();
    }
    break;
  case 'windmill':
    // Round stone tower with rotating sails
    ctx.fillStyle = farm.farmHp===1 ? '#5a5040' : '#9a9070';
    ctx.beginPath(); ctx.ellipse(0,-20,12,22,0,0,Math.PI*2); ctx.fill();
    // Conical cap
    ctx.fillStyle = farm.farmHp===1 ? '#3a2010' : '#6a4020';
    ctx.beginPath(); ctx.moveTo(-13,-38); ctx.lineTo(0,-58); ctx.lineTo(13,-38); ctx.fill();
    // Sails (4 arms, rotating)
    const sailAngle = gameTime * 0.0012 * (farm.food/farm.maxFood + 0.1);
    ctx.strokeStyle = farm.farmHp===1 ? '#3a2808' : '#7a5a30';
    ctx.lineWidth = 2.5;
    for(let arm=0; arm<4; arm++){
      const a = sailAngle + arm * Math.PI/2;
      const tx = Math.cos(a)*22, ty = Math.sin(a)*22;
      ctx.beginPath(); ctx.moveTo(0,-38); ctx.lineTo(tx, -38+ty); ctx.stroke();
      // Sail blade
      ctx.fillStyle='rgba(210,180,120,0.7)';
      ctx.save();
      ctx.translate(tx*0.5, -38+ty*0.5);
      ctx.rotate(a);
      ctx.fillRect(-3,-9,6,18);
      ctx.restore();
    }
    // Window slits
    ctx.fillStyle='rgba(40,30,10,0.7)';
    ctx.fillRect(-2,-32,4,5); ctx.fillRect(-2,-20,4,5);
    if(farm.farmHp===2){
      ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-8,-16); ctx.lineTo(-4,-4); ctx.stroke();
    }
    break;
  case 'cottage':
    // Small thatched cottage
    ctx.fillStyle = farm.farmHp===1 ? '#6a5838' : '#c8b088';
    ctx.fillRect(-14,-22,28,22);
    // Thatched roof (thick, rounded)
    ctx.fillStyle = farm.farmHp===1 ? '#4a3818' : '#8a7030';
    ctx.beginPath(); ctx.moveTo(-17,-22); ctx.lineTo(0,-40); ctx.lineTo(17,-22); ctx.fill();
    // Thatch texture lines
    ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
    for(let t=0;t<5;t++){
      ctx.beginPath(); ctx.moveTo(-16+t*7,-22); ctx.lineTo(-10+t*6,-39); ctx.stroke();
    }
    // Door + window
    ctx.fillStyle='#3a2010'; ctx.fillRect(-4,-16,8,16);
    ctx.fillStyle='rgba(200,160,80,0.6)'; ctx.fillRect(-12,-18,7,7);
    // Flower box (when healthy)
    if(farm.farmHp===3){
      ctx.fillStyle='#5a2a10'; ctx.fillRect(-14,-4,8,4);
      ctx.fillStyle='#cc3a5a';
      ctx.beginPath(); ctx.arc(-12,-6,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-8,-7,2,0,Math.PI*2); ctx.fill();
    }
    if(farm.farmHp===2){
      ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(6,-18); ctx.lineTo(2,-8); ctx.stroke();
    }
    break;
  default: // farmhouse
    ctx.fillStyle = farm.farmHp===1 ? '#6a5030' : COL.farm;
    ctx.fillRect(-15,-25,30,25);
    ctx.fillStyle = farm.farmHp===1 ? '#4a1808' : '#8a4020';
    ctx.beginPath(); ctx.moveTo(-20,-25); ctx.lineTo(0,-42); ctx.lineTo(20,-25); ctx.fill();
    ctx.fillStyle='#3a2010'; ctx.fillRect(-4,-14,8,14);
    // Wheat fields (only when alive)
    if(farm.food > 8){
      ctx.fillStyle=COL.wheat;
      for(let w=0;w<7;w++){
        const wh=7+(farm.food/farm.maxFood)*9;
        ctx.fillRect(-28+w*8,-wh,3,wh);
      }
    }
    if(farm.farmHp===2){
      ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-8,-22); ctx.lineTo(-4,-10); ctx.lineTo(-9,-2); ctx.stroke();
    }
    break;
  }
}

ctx.restore();

// Smoke puff when damaged (hp<3)
if(farm.farmHp < 3 && !farm.burning){
  const smokeA = 0.15 + Math.sin(gameTime*0.004+farm.x*0.001)*0.07;
  ctx.fillStyle=`rgba(80,70,60,${smokeA})`;
  ctx.beginPath(); ctx.arc(sx+3, fy-58, 7, 0, Math.PI*2); ctx.fill();
}

// Food bar (above building)
if(farm.food > 0 && farm.alive && !farm.burning){
  const pct = farm.food / farm.maxFood;
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.fillRect(sx-16, fy-68, 32, 5);
  ctx.fillStyle='#c8a830';
  ctx.fillRect(sx-16, fy-68, 32*pct, 5);
}

// HP pips (small squares showing remaining hits)
if(farm.farmHp < 3 && farm.alive){
  for(let h=0;h<3;h++){
    ctx.fillStyle = h < farm.farmHp ? '#cc3a20' : '#3a2020';
    ctx.fillRect(sx-8+h*7, fy-76, 5, 5);
  }
}

// Fire overlay
if(farm.burning){
  ctx.fillStyle=`rgba(232,80,32,${0.45+Math.sin(gameTime*0.009)*0.2})`;
  ctx.fillRect(sx-22, fy-58, 44, 58);
}

}
}

function drawMoscow(){
// Moscow spans from MOSCOW_X-80 to MOSCOW_X+550 (wide city)
const ox = MOSCOW_X - camera.x; // origin (left edge of city)
if(ox < -700 || ox > W+100) return;

const burned = (phase==='burned'||phase==='retreat'||phase==='gameover_win'||moscow.burned);
const dmgFactor = 1 - moscow.hp / moscow.maxHp; // 0=intact, 1=destroyed
const t = gameTime;

// ---- CITY BACKGROUND GLOW ----
if(burned){
  ctx.fillStyle=`rgba(200,50,0,${0.18+Math.sin(t*0.004)*0.07})`;

}

// ---- KREMLIN WALL (main front wall, crenellated) ----
const wallTop = GROUND_Y - 72;
const wallW = 560;

const crenCol = burned ? '#3a1e08' : '#c8b888';
ctx.fillStyle = wallCol;
ctx.fillRect(ox-40, wallTop, wallW, GROUND_Y-wallTop);
// Crenellations on top
ctx.fillStyle = crenCol;
for(let i=0;i<28;i++){
  if((i+dmgFactor*28|0) % 3 === 1 && burned) continue; // gaps from damage
  ctx.fillRect(ox-35+i*20, wallTop-12, 13, 12);
}
// Wall horizontal band (decorative)
ctx.fillStyle = burned ? '#3a1e08' : '#b8a870';
ctx.fillRect(ox-40, wallTop+15, wallW, 6);

// Gate arch in center of wall
const gateX = ox + wallW/2 - 40;
ctx.fillStyle = burned ? '#1a0a04' : '#6a4a20';

ctx.fill();
ctx.fillRect(gateX, GROUND_Y-22, 40, 22);

// ---- HELPER: draw a dramatic video-game onion dome ----
function drawDome(cx, baseY, size, primaryCol, accentCol, withCross){
  // Dome bulge (3 arcs stacked: base bulge, neck, tip)
  ctx.fillStyle = primaryCol;
  // Base arc (wide bulge)
  ctx.beginPath();
  ctx.arc(cx, baseY - size*0.3, size*0.9, Math.PI, 0);
  ctx.fill();
  // Upper neck
  ctx.beginPath();
  ctx.moveTo(cx - size*0.35, baseY - size*0.3);
  ctx.quadraticCurveTo(cx - size*0.15, baseY - size*0.7, cx - size*0.12, baseY - size*0.9);
  ctx.quadraticCurveTo(cx, baseY - size*1.3, cx, baseY - size*1.3);
  ctx.quadraticCurveTo(cx, baseY - size*1.3, cx + size*0.12, baseY - size*0.9);
  ctx.quadraticCurveTo(cx + size*0.15, baseY - size*0.7, cx + size*0.35, baseY - size*0.3);
  ctx.fill();
  // Pointed spire
  ctx.beginPath();
  ctx.moveTo(cx - size*0.1, baseY - size*1.28);
  ctx.lineTo(cx, baseY - size*1.85);
  ctx.lineTo(cx + size*0.1, baseY - size*1.28);
  ctx.fill();
  // Accent stripe / bands
  ctx.strokeStyle = accentCol;
  ctx.lineWidth = size*0.05;
  ctx.beginPath();
  ctx.arc(cx, baseY - size*0.35, size*0.82, Math.PI*1.1, Math.PI*0.05, true);
  ctx.stroke();
  // Gold ring at neck base
  ctx.fillStyle = accentCol;
  ctx.fillRect(cx - size*0.14, baseY - size*0.5, size*0.28, size*0.08);
  // Cross on top
  if(withCross && !burned){
    ctx.fillStyle = accentCol;
    ctx.fillRect(cx-1.5, baseY-size*1.95, 3, size*0.25);
    ctx.fillRect(cx-size*0.08, baseY-size*1.88, size*0.16, 2.5);
    ctx.fillRect(cx-size*0.06, baseY-size*1.82, size*0.12, 2);
  }
  // Fire on dome if burned
  if(burned){
    ctx.fillStyle=`rgba(255,80,10,${0.3+Math.sin(t*0.006+cx*0.01)*0.15})`;
    ctx.beginPath(); ctx.arc(cx, baseY-size*0.5, size*0.7, Math.PI, 0); ctx.fill();
  }
}

// ---- BACKGROUND BUILDINGS (behind wall) ----
if(!burned){
  // Distant buildings peeking above wall
  const bldgs = [
    {x:ox+20, h:95, w:38, col:'#c8b890'},
    {x:ox+90, h:110, w:50, col:'#d8c8a0'},
    {x:ox+170, h:85, w:42, col:'#c0a878'},
    {x:ox+270, h:130, w:56, col:'#d4c496'},
    {x:ox+360, h:100, w:44, col:'#ccc090'},
    {x:ox+440, h:90, w:38, col:'#c8bc88'},
  ];
  for(const b of bldgs){
    ctx.fillStyle = b.col;
    ctx.fillRect(b.x, GROUND_Y-b.h, b.w, b.h-72);
    // Roof ridge
    ctx.fillStyle = lerpColor(b.col,'#8a7050',0.3);
    ctx.fillRect(b.x, GROUND_Y-b.h, b.w, 6);
    // Window rows
    ctx.fillStyle = 'rgba(60,40,10,0.5)';
    for(let row=0;row<2;row++){
      for(let col=0;col<3;col++){
        ctx.fillRect(b.x+5+col*12, GROUND_Y-b.h+14+row*18, 8, 11);
      }
    }
  }
} else {
  // Burned building hulks
  const bldgs = [
    {x:ox+20, h:80, w:38},{x:ox+90, h:95, w:50},{x:ox+170, h:70, w:42},
    {x:ox+270, h:110, w:56},{x:ox+360, h:85, w:44},{x:ox+440, h:75, w:38},
  ];
  for(const b of bldgs){
    ctx.fillStyle = '#1a0e06';
    ctx.fillRect(b.x, GROUND_Y-b.h, b.w, b.h-60);
    // Jagged burned tops
    ctx.fillStyle = '#120a04';
    for(let w=0;w<5;w++) ctx.fillRect(b.x+w*8, GROUND_Y-b.h-(w%2)*10, 7, b.h-52+(w%2)*10);
    // Orange glow
    ctx.fillStyle=`rgba(255,90,10,${0.22+Math.sin(t*0.005+b.x*0.003)*0.1})`;
    ctx.fillRect(b.x+2, GROUND_Y-b.h+b.h-70, b.w-4, 8);
    // Smoke
    ctx.strokeStyle='rgba(30,20,10,0.5)'; ctx.lineWidth=5;
    ctx.beginPath();
    const smkX = b.x+b.w/2;
    for(let y=GROUND_Y-b.h; y>GROUND_Y-b.h-90; y-=5){
      const wx=smkX+Math.sin(t*0.0013+y*0.09+b.x*0.01)*7;
      if(y===GROUND_Y-b.h) ctx.moveTo(wx,y); else ctx.lineTo(wx,y);
    }
    ctx.stroke();
  }
}

// ---- TOWERS + DOMES ----
// Tower specs: [xOffset, height, domeSize, primaryCol, accentCol]
const towers = [
  { dx:30,  h:100, ds:22, pc: burned?'#2a1208':'#2a6a2a', ac: burned?'#5a2010':COL.gold, isMain:false },

];

for(const tw of towers){

// Kremlin bell tower (Ivan the Great) on far left — thin and very tall
const btwX = ox - 10;
ctx.fillStyle = burned ? '#1a0e06' : '#e0d0a8';
ctx.fillRect(btwX-8, GROUND_Y-185, 16, 185-72);
ctx.fillStyle = burned ? '#120a04' : '#c8b880';
for(let i=0;i<4;i++) ctx.fillRect(btwX-10, GROUND_Y-185+i*40, 20, 6);
if(!burned){
  ctx.fillStyle='rgba(50,35,10,0.55)';

}
drawDome(btwX, GROUND_Y-185, 14, burned?'#2a1208':'#1a3a8a', burned?'#5a2010':COL.gold, true);

// ---- HP BAR (when Moscow is being attacked) ----
if(!burned && moscow.hp < moscow.maxHp){
  const pct = moscow.hp / moscow.maxHp;
  const barX = ox + wallW/2 - 100;

// ---- LABEL ----
ctx.fillStyle = burned ? '#8a3020' : '#3a2a1a';
ctx.font = 'bold 15px Cinzel, serif';

}

function drawFrenchSoldier(s){
if(!s.alive && !s.dying && !s.frozenBody) return;
const sx = Math.round(s.x - camera.x);
const sy = Math.round(s.y);
if(sx < -30 || sx > W+30) return;

ctx.save();
ctx.translate(sx, sy);

if(s.frozenBody){
// Persistent frozen corpse — blue, sideways on ground
ctx.filter = `saturate(0.15) brightness(1.5) hue-rotate(195deg)`;
ctx.globalAlpha = 0.85;
ctx.rotate(Math.PI/2 * (s.facing || 1));
} else if(s.dying){
const dyingDuration = (s.deathType === 'freeze') ? 1500 : 2000;
const alpha = Math.max(0, s.dyingMs / dyingDuration);
ctx.globalAlpha = alpha;
if(s.deathType==='freeze'){
ctx.filter = `saturate(0.2) brightness(1.4) hue-rotate(195deg)`;
} else if(s.deathType==='disease'){
ctx.filter = `saturate(0.3) hue-rotate(90deg) brightness(0.75)`;
}
ctx.rotate(Math.min(Math.PI/2, (1-alpha)*Math.PI/1.8) * s.facing);
} else if(s.diseased && s.sickness > 0){
// Living sick soldiers gradually go green
const sk = s.sickness;
ctx.filter = `saturate(${1+sk*1.5}) hue-rotate(${Math.round(sk*80)}deg) brightness(${1-sk*0.25})`;
}
if(s.flash > 0) ctx.filter = 'brightness(6) saturate(0.2)';

const wk = Math.floor(s.walkTimer/190)%2;
const f = s.facing;
const isRaider = s.role === 'raider';
const isVanguard = s.role === 'vanguard';
const isWorker = s.role === 'worker';

// Shadow
ctx.fillStyle='rgba(0,0,0,0.18)';
ctx.beginPath(); ctx.ellipse(0,3,8,2.5,0,0,Math.PI*2); ctx.fill();

// Shako (tall cylindrical hat)
ctx.fillStyle='#111120';
ctx.fillRect(-4,-26,8,12);
// Brass top plate
ctx.fillStyle='#7a5a10';
ctx.fillRect(-4,-26,8,2);
// Leather peak / visor
ctx.fillStyle='#0a0a18';
ctx.fillRect(-6,-16,12,3);
// White band near brim
ctx.fillStyle='#cccccc';
ctx.fillRect(-4,-14,8,2);
// Plume (red for line infantry, white for guard, yellow for raider)
ctx.fillStyle = isRaider ? '#cc8800' : (isVanguard ? '#ffffff' : '#cc1a1a');
ctx.fillRect(-1,-31,3,6);
// Cockade (tricolor)
ctx.fillStyle='#cc1a1a'; ctx.fillRect(-2,-27,2,2);
ctx.fillStyle='#ffffff'; ctx.fillRect(0,-27,2,2);

// Head
ctx.fillStyle='#c8986a';
ctx.fillRect(-3,-13,7,8);
// Ear
ctx.fillRect(f>0?3:-4,-12,2,4);

// Dark blue coat body
ctx.fillStyle='#16246a';
ctx.fillRect(-6,-5,12,13);
// Red collar / lapel
ctx.fillStyle='#aa1a1a';
ctx.fillRect(-3,-5,6,4);
// White lapel facing
ctx.fillStyle='#d8d8d8';
ctx.fillRect(-2,-4,2,3);
ctx.fillRect(1,-4,2,3);
// Epaulette (red fringed shoulder decoration)
ctx.fillStyle='#cc1a1a';
ctx.fillRect(f>0?-6:-2,-5,4,3);
ctx.fillStyle='#ffaa00';
ctx.fillRect(f>0?-6:-2,-3,4,2);

// White cross-belts (cartridge box X pattern)
ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=1.5;
ctx.beginPath(); ctx.moveTo(-5,-4); ctx.lineTo(4,6); ctx.stroke();
ctx.beginPath(); ctx.moveTo(4,-4); ctx.lineTo(-5,6); ctx.stroke();
// Cartridge box (black square at belt)
ctx.fillStyle='#222'; ctx.fillRect(-3,4,6,4);

// White breeches (legs)
const lL=wk?2:-1, lR=wk?-1:2;
ctx.fillStyle='#d8d8d0';
ctx.fillRect(-5,8,4,8+lL);
ctx.fillRect(1,8,4,8+lR);

// Black tall boots
ctx.fillStyle='#111';
ctx.fillRect(-6,13+lL,5,5);
ctx.fillRect(0,13+lR,5,5);
// Boot top highlight
ctx.fillStyle='#333';
ctx.fillRect(-6,13+lL,5,2);
ctx.fillRect(0,13+lR,5,2);

if(isWorker){
// Worker carries a wooden plank + hammer instead of musket
ctx.fillStyle='#6a4a20';
ctx.save();
ctx.translate(f*6, -6);
ctx.rotate(s.hammerAngle);
// Hammer handle
ctx.fillRect(-1,-14,2,18);
// Hammer head
ctx.fillStyle='#888888';
ctx.fillRect(-4,-16,8,5);
ctx.restore();
// Plank under arm
ctx.fillStyle='#8a6030';
ctx.save(); ctx.translate(f*2, 3); ctx.rotate(f*0.3);
ctx.fillRect(-12,-2,24,4);
ctx.restore();
} else {
// Musket with long barrel
ctx.fillStyle='#2a1a0a';
ctx.fillRect(f*7,-14,2,22);
// Musket lock
ctx.fillStyle='#888';
ctx.fillRect(f*7-f*1,-10,f*2,4);
// Bayonet
ctx.fillStyle='#aaaaaa';
ctx.fillRect(f*7,-20,2,7);
}

// Raider food cart (drawn behind soldier when returning with food)
if(isRaider && s.carrying && s.carryFood > 0){
ctx.save();
ctx.translate(-f*14, 4);
// Small cart body
ctx.fillStyle='#7a5a20';
ctx.fillRect(-10,-4,20,8);
// Wheels
ctx.strokeStyle='#5a3a10'; ctx.lineWidth=2;
ctx.beginPath(); ctx.arc(-6,5,5,0,Math.PI*2); ctx.stroke();
ctx.beginPath(); ctx.arc(6,5,5,0,Math.PI*2); ctx.stroke();
// Food load (sacks, size = carryFood/20)
const loadH = Math.round((s.carryFood/20)*8)+2;
ctx.fillStyle='#c8a030';
ctx.fillRect(-8,-4-loadH,16,loadH);
ctx.fillStyle='#aa8020';
ctx.fillRect(-7,-4-loadH,14,3);
ctx.restore();
}

// Red exclamation for raiders who found a burnt house
if(s.exclamTimer > 0){
  const pulse = Math.sin(gameTime * 0.025) * 0.15 + 0.85;
  ctx.save();
  ctx.globalAlpha = Math.min(1, s.exclamTimer / 300) * pulse;
  ctx.fillStyle = '#ee2020';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('!', 0, -34);
  ctx.restore();
}

ctx.filter='none';
ctx.restore();
}
